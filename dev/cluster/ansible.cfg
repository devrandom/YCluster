[defaults]
inventory = inventory.yml
# etcd_nodes plugin lives in the main tree (used later by site-dev.yml).
inventory_plugins = ../../config/ansible/inventory_plugins
host_key_checking = False
stdout_callback = default
result_format = yaml
# Containers always have a system python here.
interpreter_python = /usr/bin/python3
# Quieter, faster local runs.
retry_files_enabled = False

[inventory]
enable_plugins = yaml, etcd_nodes
