# Static boot inventory for the dev container cluster.
#
# Connection is plain SSH as root (faithful to the real cluster, and makes
# the synchronize/rsync-based playbooks work). Host->container works on
# Qubes because the container's replies are established/related, which the
# Qubes INPUT chain accepts. dev-cluster.sh provisions sshd + the dev key.
#
# Mirrors the real group layout (etcd/core/compute/managed) so the real
# playbooks run unmodified.
all:
  vars:
    ansible_connection: ssh
    ansible_user: root
    ansible_become: false   # we log in as root
    # Harmless default: on a fresh 3-node bootstrap the "add member to
    # existing cluster" task is skipped, but Ansible 2.19 templates its
    # delegate_to before evaluating when:, erroring on the undefined var.
    # The set_fact in the playbook overrides this when the existing-cluster
    # path actually runs. (Latent install-etcd.yml bug surfaced by the dev env.)
    working_etcd_host: s1
    # Normally from config/ansible/group_vars (deliberately not loaded here).
    # Supply the non-secret ones the container-safe playbooks need:
    cluster_interface: eth0                          # core.yml value is bare-metal
    # Dev has no real domain or cluster TLS certs in etcd, so force nginx into
    # local (HTTP-only) mode even on storage nodes (s1-s3 are in the storage
    # group here for delegation). Without this, certbot-manager update-nginx
    # takes the real-HTTPS path and fails with "No primary domain configured".
    web_services_force_local: true
    # inventory_dir (not playbook_dir) — the latter varies per imported play.
    bootstrap_files_dir: "{{ inventory_dir }}/.ssh"  # holds ansible_ssh_key.pub
    # etcd client config single-source-of-truth (mirrors group_vars/all/main.yml,
    # which the dev playbooks deliberately don't load). See that file.
    #
    # Steady-state dev runs at `enforce` (full mTLS — the real cluster's target).
    # The migration rehearsal (etcd-tls-migrate.sh) overrides this per step with
    # -e etcd_tls_phase=off|listen|connect|enforce.
    etcd_tls_phase: enforce
    etcd_tls_rank: "{{ {'off': 0, 'listen': 1, 'connect': 2, 'enforce': 3}[etcd_tls_phase | default('off')] }}"
    etcd_tls_listening: "{{ (etcd_tls_rank | int) >= 1 }}"
    etcd_client_tls: "{{ (etcd_tls_rank | int) >= 2 }}"
    etcd_tls_enforced: "{{ (etcd_tls_rank | int) >= 3 }}"
    etcd_tls_enabled: "{{ (etcd_tls_rank | int) >= 1 }}"
    etcd_tls_dir: /etc/etcd/tls
    etcd_plaintext_client_port: 2379
    etcd_plaintext_peer_port: 2380
    etcd_tls_client_port: 2381
    etcd_tls_peer_port: 2382
    etcd_scheme: "{{ 'https' if (etcd_client_tls | default(false)) else 'http' }}"
    etcd_client_port: "{{ etcd_tls_client_port if (etcd_client_tls | default(false)) else etcd_plaintext_client_port }}"
    etcd_peer_port: "{{ etcd_tls_peer_port if (etcd_client_tls | default(false)) else etcd_plaintext_peer_port }}"
    # Controller-side PKI dir. setup-etcd-tls.yml/install-etcd.yml live in
    # config/ansible/ and so load config/ansible/group_vars/all (which sets
    # bootstrap_files_dir=/opt/bootstrap-files, higher precedence than this
    # inventory). etcd_pki_dir is NOT defined there, so this dev value wins.
    etcd_pki_dir: "{{ inventory_dir }}/.ssh/etcd-pki"
    etcd_hosts: "{{ groups['etcd'] | map('extract', hostvars, 'ansible_host') | map('regex_replace', '$', ':' ~ etcd_client_port) | join(',') }}"
    etcdctl_endpoints: "{{ groups['etcd'] | map('extract', hostvars, 'ansible_host') | map('regex_replace', '^(.+)$', etcd_scheme ~ '://\\1:' ~ etcd_client_port) | join(',') }}"
    etcd_tls_env: "{{ {'ETCD_CACERT': etcd_tls_dir ~ '/ca.crt', 'ETCD_CERT': etcd_tls_dir ~ '/client.crt', 'ETCD_KEY': etcd_tls_dir ~ '/client.key', 'ETCDCTL_CACERT': etcd_tls_dir ~ '/ca.crt', 'ETCDCTL_CERT': etcd_tls_dir ~ '/client.crt', 'ETCDCTL_KEY': etcd_tls_dir ~ '/client.key'} if (etcd_client_tls | default(false)) else {} }}"
    etcd_client_env: "{{ {'ETCD_HOSTS': etcd_hosts, 'ETCDCTL_ENDPOINTS': etcdctl_endpoints} | combine(etcd_tls_env) }}"
  children:
    etcd:
      hosts:
        s1: { ansible_host: 10.0.0.11 }
        s2: { ansible_host: 10.0.0.12 }
        s3: { ansible_host: 10.0.0.13 }
    core:
      hosts: { s1: {}, s2: {}, s3: {} }
    # In the real cluster the core nodes (s1-s3) are also the storage group.
    # We mirror that so playbooks that delegate to `groups['storage'] | first`
    # (e.g. collect-hardware-facts.yml's etcd write) resolve correctly.
    # Safe re vault: group_vars are loaded from the top-level playbook's dir
    # (dev/cluster/, which has no group_vars), so naming a `storage` group here
    # does NOT pull config/ansible/group_vars/storage/vault.yml.
    storage:
      hosts: { s1: {}, s2: {}, s3: {} }
    compute:
      hosts:
        c1: { ansible_host: 10.0.0.51 }
    managed:
      children:
        core: {}
        compute: {}
