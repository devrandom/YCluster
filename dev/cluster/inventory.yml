# Static boot inventory for the dev container cluster.
#
# Connection is plain SSH as root (faithful to the real cluster, and makes
# the synchronize/rsync-based playbooks work). Host->container works on
# Qubes because the container's replies are established/related, which the
# Qubes INPUT chain accepts. dev-cluster.sh provisions sshd + the dev key.
#
# Mirrors the real group layout (etcd/core/compute/managed) so the real
# playbooks run unmodified.
all:
  vars:
    ansible_connection: ssh
    ansible_user: root
    ansible_become: false   # we log in as root
    # Harmless default: on a fresh 3-node bootstrap the "add member to
    # existing cluster" task is skipped, but Ansible 2.19 templates its
    # delegate_to before evaluating when:, erroring on the undefined var.
    # The set_fact in the playbook overrides this when the existing-cluster
    # path actually runs. (Latent install-etcd.yml bug surfaced by the dev env.)
    working_etcd_host: s1
  children:
    etcd:
      hosts:
        s1: { ansible_host: 10.0.0.11 }
        s2: { ansible_host: 10.0.0.12 }
        s3: { ansible_host: 10.0.0.13 }
    core:
      hosts: { s1: {}, s2: {}, s3: {} }
    compute:
      hosts:
        c1: { ansible_host: 10.0.0.51 }
    managed:
      children:
        core: {}
        compute: {}
# NOTE: deliberately no `storage` group — config/ansible/group_vars/storage/
# vault.yml is the only vaulted file, and our nodes don't need it. The
# playbooks we exercise target etcd/core/managed/compute. The dev cluster
# will supply its own (non-vault) secrets when we wire services that need
# them, rather than depend on the production vault password.
