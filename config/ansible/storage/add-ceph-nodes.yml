---
- name: Add new storage nodes to MicroCeph cluster
  hosts: storage
  gather_facts: yes

  tasks:
    - name: Install microceph snap if missing
      shell: snap install microceph --channel=squid/stable
      args:
        creates: /snap/bin/microceph
      register: microceph_install

    # Match the existing s1-s3 nodes which have automatic snap refresh
    # disabled, so an unintended upgrade can't bring down a storage node
    # without warning.
    - name: Hold microceph snap updates
      command: snap refresh --hold microceph
      when: microceph_install.changed
      changed_when: true

    # Probe microceph status on every storage node, not just play_hosts.
    # With --limit, ansible_play_hosts only contains the new node, so
    # checking just play_hosts would falsely conclude no cluster exists
    # and try to bootstrap a brand new one on the new node.
    - name: Probe microceph status on all storage nodes
      command: microceph status
      register: microceph_probe
      failed_when: false
      changed_when: false
      delegate_to: "{{ item }}"
      loop: "{{ groups['storage'] }}"
      run_once: true

    - name: Build cluster and new node lists from probe
      set_fact:
        cluster_nodes: "{{ microceph_probe.results | selectattr('rc', 'equalto', 0) | map(attribute='item') | list }}"
        new_nodes: "{{ microceph_probe.results | rejectattr('rc', 'equalto', 0) | map(attribute='item') | list }}"
      run_once: true

    - name: Identify whether this host is already in cluster
      set_fact:
        is_in_cluster: "{{ inventory_hostname in cluster_nodes }}"

    # Belt-and-suspenders: bootstrapping a new cluster is destructive
    # if the detection above is wrong (e.g. all probes failed for a
    # transient network reason). Default behavior is "join only" — the
    # operator must opt in with -e allow_bootstrap=true to create a
    # fresh cluster.
    - name: Refuse to bootstrap a new cluster without explicit opt-in
      fail:
        msg: |
          No existing MicroCeph cluster found across {{ groups['storage'] | join(', ') }}.
          Refusing to auto-bootstrap. If this is genuinely a fresh cluster
          (not an existing-cluster detection failure), re-run with
          -e allow_bootstrap=true.
      when:
        - cluster_nodes | length == 0
        - not (allow_bootstrap | default(false) | bool)
      run_once: true

    - name: Bootstrap MicroCeph cluster on first node (opt-in)
      block:
        - name: Bootstrap MicroCeph cluster
          command: microceph cluster bootstrap
          when: inventory_hostname == ansible_play_hosts[0]
          register: bootstrap_result

        - name: Wait for bootstrap to complete
          pause:
            seconds: 5
          when: inventory_hostname == ansible_play_hosts[0]

        - name: Re-probe microceph status after bootstrap
          command: microceph status
          register: microceph_probe_after
          failed_when: false
          changed_when: false
          delegate_to: "{{ item }}"
          loop: "{{ groups['storage'] }}"
          run_once: true

        - name: Rebuild cluster/new lists after bootstrap
          set_fact:
            cluster_nodes: "{{ microceph_probe_after.results | selectattr('rc', 'equalto', 0) | map(attribute='item') | list }}"
            new_nodes: "{{ microceph_probe_after.results | rejectattr('rc', 'equalto', 0) | map(attribute='item') | list }}"
            is_in_cluster: "{{ inventory_hostname in (microceph_probe_after.results | selectattr('rc', 'equalto', 0) | map(attribute='item') | list) }}"
          run_once: true
      when:
        - cluster_nodes | length == 0
        - allow_bootstrap | default(false) | bool

    - name: Set rendezvous node (first configured node)
      set_fact:
        rendezvous_node: "{{ cluster_nodes | first }}"
      run_once: true
      when: cluster_nodes | length > 0

    - name: Fail if still no cluster after bootstrap attempt
      fail:
        msg: "Cluster setup did not produce a rendezvous node. Investigate microceph status on storage hosts."
      when: rendezvous_node is not defined
      run_once: true

    # Generate join tokens once on the rendezvous node (via delegate_to).
    # run_once ensures the loop fires a single time across the whole play,
    # so the token list is built regardless of which hosts --limit selected.
    - name: Generate join tokens for new nodes
      command: microceph cluster add {{ item }}
      register: join_tokens
      delegate_to: "{{ rendezvous_node }}"
      loop: "{{ new_nodes }}"
      when: new_nodes | length > 0
      run_once: true

    - name: Extract join token for this node
      set_fact:
        my_join_token: "{{ item.stdout }}"
      loop: "{{ join_tokens.results | default([]) }}"
      when:
        - not is_in_cluster
        - rendezvous_node is defined
        - item.item == inventory_hostname

    - name: Join new nodes to cluster
      command: microceph cluster join {{ my_join_token }}
      when: not is_in_cluster and my_join_token is defined

    - name: Wait for cluster to stabilize
      pause:
        seconds: 10
      when: not is_in_cluster

    - name: Verify node joined cluster
      command: microceph status
      register: final_status
      when: not is_in_cluster
      failed_when: final_status.rc != 0

    - name: Install ceph-common package
      apt:
        name: ceph-common
        state: present

    - name: Create symlinks for ceph config and keyring
      file:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        state: link
        force: yes
      loop:
        - { src: '/var/snap/microceph/current/conf/ceph.conf', dest: '/etc/ceph/ceph.conf' }
        - { src: '/var/snap/microceph/current/conf/ceph.keyring', dest: '/etc/ceph/ceph.keyring' }
      failed_when: false

    - name: Display cluster status
      debug:
        msg: "Node {{ inventory_hostname }} successfully joined MicroCeph cluster"
      when: not is_in_cluster and final_status.rc == 0
