---
# Install local-ai-proxy alongside LiteLLM.
# Listens on :4001 and forwards to a single vLLM/llama-server backend.
# Not in the hot path yet — intended for side-by-side cancellation
# validation vs. LiteLLM on :4000 before we swap them over.
#
# Two deploy modes:
#
# 1) Passthrough to a single backend (default):
#    ansible-playbook install-local-ai-proxy.yml --limit s3 \
#      -e backend_url=http://nv1.xc:8000
#    The proxy forwards the full client path (including /v1/...) to
#    the backend, so backend_url is host-only — no /v1 suffix.
#
# 2) Etcd-sourced model routing (after running
#    scripts/migrate-litellm-to-etcd.py):
#    ansible-playbook install-local-ai-proxy.yml --limit s3 \
#      -e use_etcd=true
#    The proxy watches /cluster/config/inference/models/ for model
#    definitions and routes by the request's "model" field.
#    Override the prefix with -e etcd_prefix=...
#
# The playbook builds the Go binary once on the control node (where
# /opt/infrastructure/local-ai-proxy/ already has the source via
# dev-sync) and then pushes it to each target. Requires Go at
# /usr/lib/go-1.24/bin/go on the control node (`apt install golang-1.24`).

- name: Install local-ai-proxy
  hosts: storage
  become: yes
  vars:
    backend_url: "http://nv1.xc:8000"
    proxy_listen: ":4001"
    proxy_src_dir: /opt/infrastructure/local-ai-proxy
    proxy_bin_src: /opt/infrastructure/local-ai-proxy/bin/local-ai-proxy
    proxy_bin_dst: /usr/local/bin/local-ai-proxy
    go_bin: /usr/lib/go-1.24/bin/go
  tasks:
    - name: Create local-ai-proxy system user
      user:
        name: local-ai-proxy
        system: yes
        shell: /usr/sbin/nologin
        home: /var/lib/local-ai-proxy
        create_home: no

    - name: Create local-ai-proxy config directory
      file:
        path: /etc/local-ai-proxy
        state: directory
        owner: local-ai-proxy
        group: local-ai-proxy
        mode: '0755'

    - name: Install Go toolchain on control node
      apt:
        name: golang-1.24
        state: present
      delegate_to: localhost
      become: yes
      run_once: yes

    - name: Build local-ai-proxy binary on control node
      make:
        chdir: "{{ proxy_src_dir }}"
        target: build
      environment:
        GO: "{{ go_bin }}"
      delegate_to: localhost
      become: no
      run_once: yes

    - name: Install local-ai-proxy binary on targets
      copy:
        src: "{{ proxy_bin_src }}"
        dest: "{{ proxy_bin_dst }}"
        owner: root
        group: root
        mode: '0755'
      notify: restart local-ai-proxy

    - name: Render local-ai-proxy config
      template:
        src: local-ai-proxy.yaml.j2
        dest: /etc/local-ai-proxy/config.yaml
        owner: local-ai-proxy
        group: local-ai-proxy
        mode: '0644'
      notify: restart local-ai-proxy

    - name: Install local-ai-proxy systemd unit
      copy:
        dest: /etc/systemd/system/local-ai-proxy.service
        mode: '0644'
        content: |
          [Unit]
          Description=local-ai-proxy
          After=network.target
          PartOf=ycluster-apps.target

          [Service]
          Type=exec
          ExecStart={{ proxy_bin_dst }} --config /etc/local-ai-proxy/config.yaml
          User=local-ai-proxy
          Group=local-ai-proxy
          Restart=on-failure
          RestartSec=5
          NoNewPrivileges=yes
          ProtectSystem=strict
          ProtectHome=yes
          PrivateTmp=yes
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=ycluster-apps.target
      register: service_unit
      notify: restart local-ai-proxy

    - name: Reload systemd
      systemd:
        daemon_reload: yes
      when: service_unit.changed

    - name: Enable and start local-ai-proxy
      systemd:
        name: local-ai-proxy.service
        enabled: yes
        state: started

    # ---- Auth validator: small Flask service for nginx auth_request ----

    - name: Install auth-validator apt deps
      apt:
        name:
          - python3-flask
          - python3-psycopg2
          - python3-etcd3
        state: present

    - name: Install auth-validator script
      copy:
        src: files/local-ai-proxy-auth.py
        dest: /usr/local/bin/local-ai-proxy-auth
        owner: root
        group: root
        mode: '0755'
      notify: restart local-ai-proxy-auth

    - name: Install auth-validator systemd unit
      copy:
        dest: /etc/systemd/system/local-ai-proxy-auth.service
        mode: '0644'
        content: |
          [Unit]
          Description=local-ai-proxy auth validator (nginx auth_request backend)
          After=network.target postgresql.service
          PartOf=ycluster-apps.target

          [Service]
          Type=exec
          ExecStart=/usr/local/bin/local-ai-proxy-auth
          User=local-ai-proxy
          Group=local-ai-proxy
          Environment=LISTEN_ADDR=127.0.0.1:4002
          Restart=on-failure
          RestartSec=5
          NoNewPrivileges=yes
          ProtectSystem=strict
          ProtectHome=yes
          PrivateTmp=yes
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=ycluster-apps.target
      register: auth_unit
      notify: restart local-ai-proxy-auth

    - name: Reload systemd (auth-validator)
      systemd:
        daemon_reload: yes
      when: auth_unit.changed

    - name: Enable and start auth-validator
      systemd:
        name: local-ai-proxy-auth.service
        enabled: yes
        state: started

    # ---- nginx vhost: auth_request + proxy to local-ai-proxy ----

    - name: Install local-ai-proxy nginx config (local-ai-proxy.xc)
      copy:
        src: files/local-ai-proxy-internal.conf
        dest: /etc/nginx/sites-available/local-ai-proxy-internal
        mode: '0644'
      notify: reload nginx

    - name: Enable local-ai-proxy nginx config
      file:
        src: /etc/nginx/sites-available/local-ai-proxy-internal
        dest: /etc/nginx/sites-enabled/local-ai-proxy-internal
        state: link
      notify: reload nginx

    - name: Apply any pending service restarts before smoke check
      meta: flush_handlers

    - name: Smoke check /v1/models through local-ai-proxy
      uri:
        url: "http://127.0.0.1:4001/v1/models"
        return_content: no
        status_code: [200, 401, 404]
      register: smoke
      failed_when: false
      retries: 5
      delay: 1
      until: smoke.status is defined

    - name: Report smoke check
      debug:
        msg: >-
          local-ai-proxy on {{ inventory_hostname }}:4001 replied
          {{ smoke.status | default('unreachable') }}
          ({% if use_etcd | default(false) | bool %}source=etcd:{{ etcd_prefix | default('/cluster/config/inference/models/') }}{% else %}backend={{ backend_url }}{% endif %})

  handlers:
    - name: restart local-ai-proxy
      systemd:
        name: local-ai-proxy.service
        state: restarted
        daemon_reload: yes

    - name: restart local-ai-proxy-auth
      systemd:
        name: local-ai-proxy-auth.service
        state: restarted
        daemon_reload: yes

    - name: reload nginx
      systemd:
        name: nginx
        state: reloaded
