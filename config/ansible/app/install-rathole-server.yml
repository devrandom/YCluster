---
- name: Install rathole server configuration
  hosts: frontend
  become: yes
  vars:
    rathole_binary_path: "/usr/local/bin/rathole"

  tasks:
    - name: Check if rathole binary exists on ansible host
      stat:
        path: /usr/local/bin/rathole
      register: rathole_binary_ansible_host
      delegate_to: localhost

    - name: Fail if rathole binary not found
      fail:
        msg: "Rathole binary not found. Please run build-rathole.yml first."
      when: not rathole_binary_ansible_host.stat.exists

    - name: Copy rathole binary from ansible host
      copy:
        src: /usr/local/bin/rathole
        dest: "{{ rathole_binary_path }}"
        mode: '0755'
        owner: root
        group: root

    - name: Create rathole config directory
      file:
        path: /etc/rathole
        state: directory
        mode: '0755'
        owner: root
        group: root

    # Read the token from etcd at task time (no_log) rather than carrying it
    # as an inventory var, so `ansible-inventory --host <frontend>` can't print
    # it. Same pattern as admin/install-vm-bastion.yml. Frontends have no etcd
    # access, so delegate the read to a core node.
    - name: Read rathole tunnel config from etcd
      command: etcdctl get --print-value-only /cluster/nodes/rathole/config
      delegate_to: "{{ groups['core'][0] }}"
      environment: "{{ etcd_client_env }}"
      register: rathole_cfg_raw
      changed_when: false
      no_log: true

    - name: Parse rathole token
      set_fact:
        rathole_token: "{{ (rathole_cfg_raw.stdout | from_json).token }}"
      no_log: true

    - name: Create rathole server configuration
      template:
        src: rathole-server.toml.j2
        dest: /etc/rathole/server.toml
        mode: '0644'
        owner: root
        group: root
      notify: restart rathole
      no_log: true

    - name: Create rathole systemd service for server
      copy:
        dest: /etc/systemd/system/rathole.service
        mode: '0644'
        owner: root
        group: root
        content: |
          [Unit]
          Description=Rathole Server
          After=network.target
          
          [Service]
          Type=simple
          User=root
          ExecStart=/usr/local/bin/rathole /etc/rathole/server.toml
          Restart=always
          RestartSec=5
          
          [Install]
          WantedBy=multi-user.target
      notify:
        - reload systemd
        - restart rathole

    - name: Enable and start rathole service
      systemd:
        name: rathole
        enabled: yes
        state: started
        daemon_reload: yes

    # Frontend nodes are public, so run a host firewall (ufw) with
    # least-privilege openings rather than relying on an implicit cloud
    # security group. SSH is allowed before enabling so a run can't lock us
    # out, and the rathole public ports are parsed from the rendered config so
    # the rules track the template as services are added.
    - name: Install ufw
      apt:
        name: ufw
        state: present

    - name: Determine public rathole ports from the rendered config
      shell: "grep -oE '0\\.0\\.0\\.0:[0-9]+' /etc/rathole/server.toml | cut -d: -f2 | sort -un"
      register: rathole_public_ports
      changed_when: false

    - name: Allow SSH through ufw (before enabling, to avoid lockout)
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Allow public rathole ports through ufw
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ rathole_public_ports.stdout_lines }}"

    - name: Set default-deny incoming and enable ufw
      community.general.ufw:
        state: enabled
        direction: incoming
        policy: deny

    - name: Default-allow outgoing
      community.general.ufw:
        direction: outgoing
        policy: allow

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: restart rathole
      systemd:
        name: rathole
        state: restarted
