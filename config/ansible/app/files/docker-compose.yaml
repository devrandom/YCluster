services:
  open-webui:
    image: registry.xc:5000/open-webui-with-plugins:${OPENWEBUI_INSTANCE:-latest}
    container_name: open-webui${OPENWEBUI_INSTANCE:+-${OPENWEBUI_INSTANCE}}
    volumes:
      - ${OPENWEBUI_DATA_DIR:-/rbd/misc/app}/open-webui-data:/app/backend/data
    ports:
      - ${OPEN_WEBUI_PORT-8380}:8080
    environment:
      - 'DATABASE_URL=postgresql://${OPENWEBUI_DB_USER:-openwebui}:${OPENWEBUI_DB_PASS:-openwebui}@host.docker.internal/${OPENWEBUI_DB_NAME:-openwebui}'
      - 'WEBUI_SECRET_KEY=${OPEN_WEBUI_SECRET_KEY}'
      - 'GLOBAL_LOG_LEVEL=${GLOBAL_LOG_LEVEL:-INFO}'
      # Inference gateway — all models routed through local-ai-proxy via
      # inference.xc (nginx auth_request enforces per-user bearer auth).
      # NOTE: These env vars only take effect on first boot. Open-WebUI persists
      # connection settings in its DB, which takes precedence on subsequent starts.
      # For existing deployments, update via Admin Panel -> Settings -> Connections.
      - 'OPENAI_API_BASE_URLS=http://inference.xc/v1'
      - 'OPENAI_API_KEYS=${INFERENCE_MASTER_KEY}'
      # Enable per-user API keys so users can access inference directly
      - 'ENABLE_API_KEYS=True'
      # Forward user identity headers downstream for per-user attribution
      - 'ENABLE_FORWARD_USER_INFO_HEADERS=True'
      - 'OPEN_WEBUI_PLUGINS=open_webui_plugins'
      - 'MEM_QDRANT_URL=host.docker.internal'
      # mem0 plugin: keep ollama provider for now until a suitable model is
      # configured in the inference gateway for memory operations and embeddings.
      - 'MEM_LLM_PROVIDER=ollama'
      - 'MEM_EMBEDDER_PROVIDER=ollama'
      - 'MEM_OLLAMA_LLM_MODEL=deepseek-r1:70b'
      - 'MEM_VECTOR_STORE_QDRANT_DIMS=768'
      # OIDC login via the cluster IdP — values come from the manager's env
      # file (set only on the main instance once authentik is live); empty
      # client id leaves OAuth disabled.
      - 'OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID:-}'
      - 'OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET:-}'
      - 'OPENID_PROVIDER_URL=${OPENID_PROVIDER_URL:-}'
      - 'OAUTH_PROVIDER_NAME=YCluster'
      - 'ENABLE_OAUTH_SIGNUP=${ENABLE_OAUTH_SIGNUP:-False}'
      - 'OAUTH_MERGE_ACCOUNTS_BY_EMAIL=${OAUTH_MERGE_ACCOUNTS_BY_EMAIL:-False}'
      - 'ENABLE_SIGNUP=${ENABLE_SIGNUP:-True}'
      # Username/password login form. Hidden once OAuth is live (manager sets
      # this False) so the IdP button is the only way in; True by default so a
      # pre-OAuth instance stays reachable.
      - 'ENABLE_LOGIN_FORM=${ENABLE_LOGIN_FORM:-True}'
      - 'DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-pending}'
    extra_hosts:
      - host.docker.internal:host-gateway
      # Resolve cluster .xc names that aren't in Docker's embedded DNS so the
      # container can hit the host's nginx vhosts (inference.xc → local-ai-proxy).
      - inference.xc:host-gateway
      # The OIDC issuer must resolve from inside the container; the host's
      # nginx serves auth.<domain> with the real certificate, so host-gateway
      # avoids hairpinning through the external frontend.
      - auth.${EXTERNAL_DOMAIN:-domain-unset.invalid}:host-gateway
    restart: unless-stopped
