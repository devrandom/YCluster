# HTTP - local-ai-proxy with nginx-enforced auth_request
# Intended to eventually replace inference.xc (litellm-internal.conf)
# once we're happy with it. Kept as a separate vhost during transition.

server {
    listen 80;
    server_name local-ai-proxy.xc;

    client_max_body_size 50M;

    # Internal auth subrequest: nginx calls /auth on the validator with
    # the client's Authorization header; on 200 the response's
    # X-User-Id is made available as $user_id.
    location = /__auth {
        internal;
        proxy_pass http://127.0.0.1:4002/auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
    }

    location / {
        # Restrict to cluster subnet (same as inference.xc).
        allow 10.0.0.0/24;
        allow 127.0.0.0/8;
        deny all;

        auth_request /__auth;
        auth_request_set $user_id $upstream_http_x_user_id;

        # Strip client Authorization before forwarding — local-ai-proxy
        # trusts X-User-Id from us and doesn't need to see bearers.
        proxy_set_header Authorization "";
        proxy_set_header X-User-Id $user_id;

        proxy_pass http://127.0.0.1:4001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;

        # Long timeouts for inference
        proxy_connect_timeout 10m;
        proxy_send_timeout 10m;
        proxy_read_timeout 10m;
    }
}
