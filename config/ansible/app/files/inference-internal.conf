# HTTP - inference.xc (cluster-internal)
#
#   /         → local-ai-proxy on :4001 (new; auth enforced by nginx)
#   /old/v1/  → LiteLLM on :4000     (transitional fallback during cutover;
#                                     LiteLLM enforces its own auth)
#
# Both paths are restricted to the cluster subnet. External access lands
# via Open-WebUI's domain (see open-webui.conf.j2).

server {
    listen 80;
    server_name inference.xc;

    underscores_in_headers on;

    # 200M accommodates audio uploads to /v1/audio/transcriptions
    # (whisperx accepts up to ~200M; the proxy's multipart body cap is
    # set in lockstep). Chat completions stay well under 1M in practice.
    client_max_body_size 200M;

    # Internal auth subrequest: nginx calls /auth on the validator with
    # the client's Authorization header; on 200 the validator's
    # X-User-Id is exposed as $user_id.
    location = /__auth {
        internal;
        proxy_pass http://127.0.0.1:4002/auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
    }

    # Fallback: /old/v1/... → LiteLLM on :4000.
    # LiteLLM enforces its own bearer-token auth; no auth_request here.
    location /old/ {
        allow 10.0.0.0/24;
        allow 127.0.0.0/8;
        # Docker bridge networks on the host (Open-WebUI etc. talk to us
        # via host-gateway). nginx still gates with auth_request below.
        allow 172.16.0.0/12;
        deny all;

        rewrite ^/old(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 10m;
        proxy_send_timeout 10m;
        proxy_read_timeout 10m;
    }

    # Primary: /v1/... → local-ai-proxy on :4001 after auth_request.
    location / {
        allow 10.0.0.0/24;
        allow 127.0.0.0/8;
        # Docker bridge networks on the host (Open-WebUI etc. talk to us
        # via host-gateway). nginx still gates with auth_request below.
        allow 172.16.0.0/12;
        deny all;

        auth_request /__auth;
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_groups $upstream_http_x_user_groups;

        # Strip client Authorization — local-ai-proxy trusts X-User-Id
        # from us and doesn't need to see bearer tokens.
        proxy_set_header Authorization "";
        proxy_set_header X-User-Id $user_id;
        proxy_set_header X-User-Groups $user_groups;

        proxy_pass http://127.0.0.1:4001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 10m;
        proxy_send_timeout 10m;
        proxy_read_timeout 10m;
    }
}
