# Static control-plane FLOOR — true for every ycluster, defined WITHOUT
# querying etcd.
#
# Every ycluster has at least s1-s3 as both its etcd quorum and its core
# (the convention: first three storage nodes at 10.0.0.11-13). Declaring that
# floor statically means the groups exist before/without a live etcd cluster,
# which three things depend on:
#   1. Bootstrap — install-etcd.yml reads groups['etcd'] to build the initial
#      cluster, before etcd is ever up.
#   2. Disaster recovery — etcd-recovery playbooks (wipe-etcd, install-etcd,
#      setup-etcd-tls) target `hosts: etcd`; without this they'd match nothing
#      when the cluster is down (the etcd_nodes plugin bails on no connection).
#   3. A non-empty `core` floor during an outage.
#
# This file is GENERAL — identical for every cluster, so it stays in the repo
# unchanged. A given cluster that exceeds the floor (more core nodes, or a
# larger etcd quorum) declares the extra members in inventory_cluster.yml,
# which is loaded next and unions in. The etcd_nodes plugin (loaded last) then
# adds the fully dynamic groups (storage, compute, ...) and any s4+ that have
# registered. Keep etcd at an ODD size.
all:
  children:
    core:
      children:
        etcd:
          hosts:
            s1:
              ansible_host: 10.0.0.11
            s2:
              ansible_host: 10.0.0.12
            s3:
              ansible_host: 10.0.0.13
    macos:
      hosts: {}
