---
- name: Setup macOS nodes
  hosts: macos
  become: yes
  # The bootstrap installs Xcode CLT (the python Ansible needs) and makes the
  # node reachable; post-reachability hardening (sleep/power, SSH key-only)
  # lives here so every node converges identically whether it joined over LAN
  # or WireGuard.
  vars:
    ntp_server: "{{ ntp_server_override | default('10.0.0.254') }}"
    dns_server: "{{ dns_server_override | default('10.0.0.254') }}"
    health_service_dir: "/usr/local/ycluster"

  tasks:
    - name: Install /etc/inputrc for readline word-navigation (Ctrl+Arrow)
      copy:
        dest: /etc/inputrc
        mode: '0644'
        content: |
          set input-meta on
          set output-meta on

          $if mode=emacs

          "\e[1~": beginning-of-line
          "\e[4~": end-of-line
          "\e[3~": delete-char
          "\e[2~": quoted-insert

          "\e[1;5C": forward-word
          "\e[1;5D": backward-word
          "\e[5C": forward-word
          "\e[5D": backward-word
          "\e\e[C": forward-word
          "\e\e[D": backward-word

          $endif

    - name: Create dev user
      user:
        name: dev
        group: admin
        shell: /bin/bash
        create_home: yes
        home: /Users/dev
      become: yes
    
    - name: Check if Homebrew is installed
      stat:
        path: /opt/homebrew/bin/brew
      register: homebrew_check
      become: no
    
    - name: Clone Homebrew repository
      git:
        repo: https://github.com/Homebrew/brew
        dest: /opt/homebrew
        version: 9da27e1ac280ce720dfcbe6d5dac0dab2dcfc508
      become: yes
      when: not homebrew_check.stat.exists
    
    # Normalize ownership whether the playbook just cloned brew (root-owned) or
    # it was pre-installed by a human (the wg-macos bootstrap's prerequisite,
    # owned by their admin account). Skips the expensive recurse once brew is
    # already dev-owned.
    - name: Set Homebrew ownership to dev user
      file:
        path: /opt/homebrew
        owner: dev
        group: admin
        recurse: yes
      become: yes
      when: not homebrew_check.stat.exists or (homebrew_check.stat.pw_name | default('')) != 'dev'
    
    - name: Create Homebrew directories
      file:
        path: "{{ item }}"
        state: directory
        owner: dev
        group: admin
        mode: '0755'
      become: yes
      loop:
        - /opt/homebrew/var/homebrew
        - /opt/homebrew/var/homebrew/linked
      when: not homebrew_check.stat.exists or (homebrew_check.stat.pw_name | default('')) != 'dev'
    
    - name: Add Homebrew to PATH for dev user
      lineinfile:
        path: /Users/dev/.bash_profile
        line: 'eval "$(/opt/homebrew/bin/brew shellenv)"'
        create: yes
        owner: dev
        group: admin
      become: yes
    
    # DEPRECATED: Ollama is no longer used. llama-server (llama.cpp) is used
    # directly instead, as it is more efficient and has a cleaner API surface.
    # Ollama is kept installed to avoid breaking existing state, but the service
    # is stopped and disabled. Remove this block once all nodes are confirmed clean.
    - name: Install Ollama via Homebrew (deprecated, kept for idempotency)
      homebrew:
        name: ollama
        state: present
      become: yes
      become_user: dev
      environment:
        PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"

    - name: Install llama.cpp via Homebrew
      homebrew:
        name: llama.cpp
        state: present
      become: yes
      become_user: dev
      environment:
        PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"

    - name: Create models directory for dev user
      file:
        path: /Users/dev/models
        state: directory
        owner: dev
        group: admin
        mode: '0755'
      become: yes

    - name: Create Homebrew log directory
      file:
        path: /opt/homebrew/var/log
        state: directory
        owner: dev
        group: admin
        mode: '0755'
      become: yes
    
    # DEPRECATED: Ollama service is disabled. The plist is kept so the playbook
    # remains idempotent on nodes where it was previously deployed.
    - name: Create Ollama LaunchDaemon plist (deprecated — service kept stopped)
      copy:
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>KeepAlive</key>
          	<true/>
          	<key>Label</key>
          	<string>com.ycluster.ollama</string>
          	<key>ProgramArguments</key>
          	<array>
          		<string>/opt/homebrew/opt/ollama/bin/ollama</string>
          		<string>serve</string>
          	</array>
          	<key>UserName</key>
          	<string>dev</string>
          	<key>GroupName</key>
          	<string>admin</string>
            <key>EnvironmentVariables</key>
          	<dict>
          		<key>OLLAMA_HOST</key>
          		<string>0.0.0.0</string>
                <key>OLLAMA_KEEP_ALIVE</key>
                <string>144h</string>
                <key>HOME</key>
                <string>/Users/dev</string>
            </dict>
          	<key>RunAtLoad</key>
          	<true/>
          	<key>StandardErrorPath</key>
          	<string>/opt/homebrew/var/log/ollama.log</string>
          	<key>StandardOutPath</key>
          	<string>/opt/homebrew/var/log/ollama.log</string>
          	<key>WorkingDirectory</key>
          	<string>/opt/homebrew/var</string>
          </dict>
          </plist>
        dest: /Library/LaunchDaemons/com.ycluster.ollama.plist
        mode: '0644'
      become: yes

    - name: Stop and disable Ollama LaunchDaemon (deprecated)
      shell: |
        launchctl stop com.ycluster.ollama || true
        launchctl unload /Library/LaunchDaemons/com.ycluster.ollama.plist || true
      become: yes
      changed_when: false

    # DEPRECATED: llama-server is superseded by the exo cluster (see
    # macos/setup-exo.yml). The plist is kept (Disabled) so the playbook
    # stays idempotent on nodes where it was previously deployed, but the
    # service no longer loads at boot. Remove this block once all nodes
    # are confirmed clean.
    - name: Create llama-server LaunchDaemon plist (deprecated — disabled)
      copy:
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>Disabled</key>
          	<true/>
          	<key>KeepAlive</key>
          	<true/>
          	<key>Label</key>
          	<string>com.ycluster.llama-server</string>
          	<key>ProgramArguments</key>
          	<array>
          		<string>/opt/homebrew/bin/llama-server</string>
          		<string>--models-dir</string>
          		<string>/Users/dev/models</string>
          		<string>--host</string>
          		<string>0.0.0.0</string>
          	</array>
          	<key>UserName</key>
          	<string>dev</string>
          	<key>GroupName</key>
          	<string>admin</string>
          	<key>EnvironmentVariables</key>
          	<dict>
          		<key>HOME</key>
          		<string>/Users/dev</string>
          	</dict>
          	<key>RunAtLoad</key>
          	<true/>
          	<key>StandardErrorPath</key>
          	<string>/opt/homebrew/var/log/llama-server.log</string>
          	<key>StandardOutPath</key>
          	<string>/opt/homebrew/var/log/llama-server.log</string>
          	<key>WorkingDirectory</key>
          	<string>/tmp</string>
          </dict>
          </plist>
        dest: /Library/LaunchDaemons/com.ycluster.llama-server.plist
        mode: '0644'
      become: yes
      notify: disable llama-server service

    - name: Disable sleep and enable auto-restart after power failure
      # A cluster node must stay awake and come back after a brownout; sitting
      # dark or asleep makes it effectively offline (and drops any wg tunnel).
      # The bootstrap sets these too — this re-asserts and catches up existing
      # nodes (e.g. m2, which stayed dark after an AC blip).
      command: pmset -a sleep 0 disksleep 0 displaysleep 1 hibernatemode 0 powernap 0 standby 0 autopoweroff 0 autorestart 1
      become: yes
      changed_when: false

    - name: Harden SSH — key-only authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?\s*{{ item.key }}\b'
        line: "{{ item.key }} {{ item.value }}"
      loop:
        - { key: PasswordAuthentication, value: 'no' }
        - { key: ChallengeResponseAuthentication, value: 'no' }
      become: yes
      notify: restart sshd

    # Split DNS: route only .xc (cluster names) to the cluster resolver over
    # wg and leave the node's own resolver (DHCP / Tailscale / ISP) for
    # everything else. Pinning the whole Ethernet resolver at the cluster VIP
    # breaks public resolution on a remote node with its own networking.
    - name: Ensure /etc/resolver exists
      file:
        path: /etc/resolver
        state: directory
        mode: '0755'
      become: yes

    - name: Route .xc DNS to the cluster (split DNS)
      copy:
        dest: /etc/resolver/xc
        content: "nameserver {{ dns_server }}\n"
        mode: '0644'
      become: yes
      notify: flush dns cache

    - name: Check current DNS servers for Ethernet
      command: networksetup -getdnsservers "Ethernet"
      register: current_dns_servers
      become: yes
      ignore_errors: yes
      changed_when: false

    # Undo the old blunt override on already-provisioned nodes: .xc is now
    # handled by /etc/resolver/xc, so Ethernet should fall back to its own/DHCP
    # resolver. Self-cleaning — once reverted, dns_server is no longer present.
    - name: Revert forced cluster DNS on Ethernet to automatic
      command: networksetup -setdnsservers "Ethernet" "Empty"
      become: yes
      ignore_errors: yes
      when: current_dns_servers.rc == 0 and dns_server in current_dns_servers.stdout
      notify: flush dns cache

    - name: Check current NTP server
      command: systemsetup -getnetworktimeserver
      register: current_ntp_server
      become: yes
      changed_when: false

    - name: Configure NTP server
      command: systemsetup -setnetworktimeserver {{ ntp_server }}
      become: yes
      when: ntp_server not in current_ntp_server.stdout

    - name: Check if network time is enabled
      command: systemsetup -getusingnetworktime
      register: network_time_status
      become: yes
      changed_when: false

    - name: Enable automatic time setting
      command: systemsetup -setusingnetworktime on
      become: yes
      when: "'Network Time: On' not in network_time_status.stdout"

    - name: Force NTP sync
      command: sntp -sS {{ ntp_server }}
      become: yes
      ignore_errors: yes
      changed_when: false

    - name: Verify NTP configuration
      command: systemsetup -getnetworktimeserver
      register: ntp_config
      changed_when: false

    - name: Display NTP configuration
      debug:
        msg: "NTP server configured: {{ ntp_config.stdout }}"
    
    - name: Create YCluster service directory
      file:
        path: "{{ health_service_dir }}"
        state: directory
        mode: '0755'
      become: yes
    
    - name: Install macOS health service
      copy:
        src: files/health-service.py
        dest: "{{ health_service_dir }}/health-service.py"
        mode: '0755'
      become: yes
      notify: restart health service
    
    - name: Create Python virtual environment
      command: python3 -m venv {{ health_service_dir }}/venv
      args:
        creates: "{{ health_service_dir }}/venv/bin/python"
      become: yes
    
    - name: Install Flask in virtual environment
      pip:
        name: flask
        virtualenv: "{{ health_service_dir }}/venv"
      become: yes
    
    - name: Install requests in virtual environment
      pip:
        name: requests
        virtualenv: "{{ health_service_dir }}/venv"
      become: yes
    
    - name: Install ntplib in virtual environment
      pip:
        name: ntplib
        virtualenv: "{{ health_service_dir }}/venv"
      become: yes
    
    - name: Create launchd plist for health service
      copy:
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Label</key>
              <string>com.ycluster.health</string>
              <key>ProgramArguments</key>
              <array>
                  <string>{{ health_service_dir }}/venv/bin/python</string>
                  <string>{{ health_service_dir }}/health-service.py</string>
              </array>
              <key>RunAtLoad</key>
              <true/>
              <key>KeepAlive</key>
              <true/>
              <key>StandardOutPath</key>
              <string>/var/log/ycluster-health.log</string>
              <key>StandardErrorPath</key>
              <string>/var/log/ycluster-health.log</string>
              <key>WorkingDirectory</key>
              <string>{{ health_service_dir }}</string>
          </dict>
          </plist>
        dest: /Library/LaunchDaemons/com.ycluster.health.plist
        mode: '0644'
      become: yes
      notify: restart health service
    
  handlers:
    - name: flush dns cache
      shell: dscacheutil -flushcache; killall -HUP mDNSResponder
      become: yes

    - name: restart sshd
      # macOS spawns sshd per-connection from launchd, so new sessions pick up
      # sshd_config on their own; bounce the daemon so the change is in force
      # immediately rather than at the next reconnect.
      shell: |
        launchctl stop com.openssh.sshd 2>/dev/null || true
        launchctl start com.openssh.sshd 2>/dev/null || true
      become: yes

    - name: restart health service
      shell: |
        launchctl stop com.ycluster.health || true
        launchctl unload /Library/LaunchDaemons/com.ycluster.health.plist || true
        launchctl load /Library/LaunchDaemons/com.ycluster.health.plist
        launchctl start com.ycluster.health
      become: yes
    
    - name: disable llama-server service
      # Superseded by exo. Stop and unload; the Disabled key in the plist
      # keeps it from loading again at boot.
      shell: |
        launchctl stop com.ycluster.llama-server || true
        launchctl unload /Library/LaunchDaemons/com.ycluster.llama-server.plist || true
      become: yes
      changed_when: false
