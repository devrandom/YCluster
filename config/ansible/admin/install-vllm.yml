---
- name: Install vLLM on Nvidia GPU nodes
  hosts: nvidia
  become: yes
  tasks:
    # Skip hosts with no host-usable NVIDIA GPU — either no NVIDIA hardware
    # at all, or every NVIDIA card is bound to vfio-pci for guest passthrough
    # (nv3 case). vLLM's import path initialises CUDA and fails when no GPU
    # is visible to the host driver.
    - name: End play for nodes with no host-visible NVIDIA GPU
      meta: end_host
      when: (ansible_local.gpu.nvidia_host_gpu_count | default(0) | int) == 0

    - name: Install vLLM as a uv tool (0.20.x)
      command: /snap/bin/uv tool install --upgrade 'vllm>=0.20,<0.21'
      become_user: dev
      environment:
        HOME: /home/dev
      register: vllm_install
      changed_when: "'Installed' in vllm_install.stdout or 'Updated' in vllm_install.stdout"

    - name: Verify vLLM installation
      command: /home/dev/.local/bin/vllm --version
      become_user: dev
      environment:
        HOME: /home/dev
      register: vllm_version
      changed_when: false

    - name: Display vLLM version
      debug:
        msg: "{{ vllm_version.stdout }} (installed for dev user)"
