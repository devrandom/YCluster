---
# Deploys a bastion container on the Incus VM bridge. The bastion runs a
# jump-only sshd plus a rathole client, giving external SSH access to GPU
# VMs via:  ssh -J jump@<rathole-host>:<port> ubuntu@<vm-name>
# (port = 2212 for nv2, 2213 for nv3 — see app/templates/rathole-server.toml.j2)
#
# The bastion sits on incusbr0, so it is confined exactly like the VMs: it
# can reach the VMs and the internet, but not nv2's sshd or the cluster.
#
# Per-user access is generated from the etcd registries by
# `ycluster vm bastion-sync` (run here, and on every VM/key change).
#
# Requires the rathole server to expose the matching 'vm-bastion' service
# (app/templates/rathole-server.toml.j2 — re-run app/install-rathole-server.yml).
- name: Deploy the VM-access bastion container
  hosts: compute
  become: yes
  vars:
    vm_bastion_container: bastion
    vm_bastion_jump_user: jump
    vm_bastion_image: "images:ubuntu/24.04"
    etcd_endpoints: "10.0.0.11:2379,10.0.0.12:2379,10.0.0.13:2379"
  tasks:
    - name: End play unless this node hosts Incus instances
      meta: end_host
      when: not (incus_vm_host | default(false)
                 or incus_container_host | default(false))

    - name: Check rathole binary exists on the Ansible controller
      stat:
        path: /usr/local/bin/rathole
      register: rathole_bin
      delegate_to: localhost

    - name: Fail if rathole binary is missing
      fail:
        msg: "Rathole binary not found on the controller. Run app/build-rathole.yml first."
      when: not rathole_bin.stat.exists

    - name: Read rathole tunnel config from etcd
      command: etcdctl get --print-value-only /cluster/nodes/rathole/config
      delegate_to: "{{ groups['core'][0] }}"
      register: rathole_cfg_raw
      changed_when: false

    - name: Parse rathole tunnel config
      set_fact:
        rathole_remote_addr: "{{ (rathole_cfg_raw.stdout | from_json).remote_addr }}"
        rathole_token: "{{ (rathole_cfg_raw.stdout | from_json).token }}"
      no_log: true

    - name: Copy rathole binary to the Incus host
      copy:
        src: /usr/local/bin/rathole
        dest: /usr/local/bin/rathole
        mode: '0755'

    - name: Check whether the bastion container exists
      command: "incus info {{ vm_bastion_container }}"
      register: bastion_info
      changed_when: false
      failed_when: false

    - name: Launch the bastion container
      command: "incus launch {{ vm_bastion_image }} {{ vm_bastion_container }}"
      when: bastion_info.rc != 0

    - name: Wait for the bastion container to be reachable
      command: "incus exec {{ vm_bastion_container }} -- true"
      register: bastion_ready
      retries: 30
      delay: 3
      until: bastion_ready.rc == 0
      changed_when: false

    # First-boot cloud-init holds the apt-lists lock for ~30 s. The setup
    # script runs apt-get install, which will fail with "Could not get
    # lock /var/lib/apt/lists/lock" if it races. cloud-init may not be
    # installed in older base images, so poll for the lock directly.
    - name: Wait for the bastion's apt lock to be free
      shell: |
        for _ in $(seq 1 150); do
          incus exec {{ vm_bastion_container }} -- bash -c \
            'pgrep -x apt-get >/dev/null || pgrep -x dpkg >/dev/null' \
            || exit 0
          sleep 4
        done
        echo "apt still locked after 600s" >&2
        exit 1
      changed_when: false

    # Skip the push entirely when the binary content already matches.
    # Without this, every run swaps the rathole inode (atomic-rename)
    # and the setup script's restart-on-replace logic would bounce
    # rathole every site.yml run.
    - name: Hash the rathole binary on the host
      stat:
        path: /usr/local/bin/rathole
        checksum_algorithm: sha256
      register: rathole_host_stat

    - name: Hash the rathole binary inside the bastion
      command: incus exec {{ vm_bastion_container }} -- sha256sum /usr/local/bin/rathole
      register: rathole_bastion_sum
      changed_when: false
      failed_when: false

    - name: Decide whether the rathole binary needs replacing
      set_fact:
        rathole_binary_needs_push: >-
          {{ rathole_bastion_sum.rc != 0
             or rathole_host_stat.stat.checksum != (rathole_bastion_sum.stdout.split() | first) }}

    # Push to a staging path and atomic-rename: overwriting a running
    # binary with `incus file push` (open O_TRUNC) fails with ETXTBSY,
    # but rename(2) over a running executable is fine — the kernel keeps
    # the old inode alive for the running process and links the new one
    # in place. The setup script restarts rathole afterwards.
    - name: Push rathole binary into the bastion (staging path)
      command: >
        incus file push /usr/local/bin/rathole
        {{ vm_bastion_container }}/usr/local/bin/rathole.new --mode 0755
      when: rathole_binary_needs_push
      changed_when: false

    - name: Atomically replace rathole binary inside the bastion
      command: >
        incus exec {{ vm_bastion_container }} --
        mv /usr/local/bin/rathole.new /usr/local/bin/rathole
      when: rathole_binary_needs_push
      changed_when: false

    # The mv above swaps the on-disk inode; the running rathole keeps the
    # old inode open until restarted. Bounce it explicitly here rather
    # than having the setup script chase inodes inside the container.
    - name: Restart rathole after binary replacement
      command: >
        incus exec {{ vm_bastion_container }} --
        systemctl restart rathole-bastion.service
      when: rathole_binary_needs_push
      changed_when: rathole_binary_needs_push

    - name: Render the bastion setup script
      set_fact:
        bastion_setup_script: "{{ lookup('template', 'bastion-setup.sh.j2') }}"
      no_log: true

    # The staged script (mode 0700) contains the rathole token, so its
    # *file* mode is the sensitive bit; the parent dir is fine at 0755
    # (matches install-nvidia.yml so the two plays don't flip-flop it).
    - name: Ensure /var/cache/ycluster exists for the staged script
      file:
        path: /var/cache/ycluster
        state: directory
        mode: '0755'

    # Persist the rendered script across runs so `copy:`'s checksum check
    # can recognise no-change re-runs as no-ops. (Previously this was
    # staged into /tmp and deleted after exec, which guaranteed a fresh
    # "changed" report every time.)
    - name: Stage the bastion setup script on the host
      copy:
        content: "{{ bastion_setup_script }}"
        dest: /var/cache/ycluster/bastion-setup.sh
        mode: '0700'
      no_log: true
      register: bastion_setup_stage

    - name: Push the setup script into the bastion
      command: >
        incus file push /var/cache/ycluster/bastion-setup.sh
        {{ vm_bastion_container }}/root/bastion-setup.sh --mode 0700
      when: bastion_setup_stage is changed
      changed_when: false

    # Always exec — the script also detects atomic-replaced /usr/local/bin/rathole
    # (inode diff vs the running rathole process) and restarts on its own.
    # With the rewritten template, "Bastion configured" is printed only when
    # the script actually mutated something or restarted a service; on a
    # genuine no-op it prints "Bastion: no changes." and we report ok.
    - name: Run the bastion setup script
      command: "incus exec {{ vm_bastion_container }} -- bash /root/bastion-setup.sh"
      register: bastion_setup_run
      changed_when: "'Bastion configured' in bastion_setup_run.stdout"

    # bastion-sync now skips the incus push when the rendered key list
    # matches what is already in the container, and prints "no changes"
    # in that case. changed_when distinguishes the two paths.
    - name: Populate the bastion access list from the etcd registries
      command: ycluster vm bastion-sync
      environment:
        ETCD_HOSTS: "{{ etcd_endpoints }}"
      register: bastion_sync_run
      changed_when: "'no changes' not in bastion_sync_run.stdout"

    - name: Install ycluster-bastion-watch systemd unit
      copy:
        dest: /etc/systemd/system/ycluster-bastion-watch.service
        mode: '0644'
        owner: root
        group: root
        content: |
          [Unit]
          Description=Watch etcd user/VM registries and re-sync the bastion
          After=network-online.target snap.incus.daemon.service
          Wants=network-online.target

          [Service]
          Type=simple
          Environment=ETCD_HOSTS={{ etcd_endpoints }}
          ExecStart=/usr/local/bin/ycluster vm bastion-watch
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      register: bastion_watch_unit

    - name: Enable and start ycluster-bastion-watch
      systemd:
        name: ycluster-bastion-watch
        enabled: yes
        state: "{{ 'restarted' if bastion_watch_unit.changed else 'started' }}"
        daemon_reload: yes

    - name: Show bastion deployment result
      debug:
        msg: "{{ bastion_setup_run.stdout_lines + bastion_sync_run.stdout_lines }}"
