---
- name: Setup WireGuard overlay on gateway VIP holders
  hosts: core
  become: yes
  vars:
    wg_reconcile_interval: "30s"

  tasks:
    - name: Install wireguard
      apt:
        name:
          - wireguard
          - wireguard-tools
        state: present
      tags: packages

    - name: Ensure /etc/wireguard exists
      file:
        path: /etc/wireguard
        state: directory
        owner: root
        group: root
        mode: '0700'

    # Reconcile is driven by a systemd timer rather than keepalived hooks so
    # this playbook stays independent of setup-gateway-vip.yml. The wrapper
    # checks whether this host currently owns the gateway VIP — if so it
    # applies the server wg0 config from etcd, otherwise it tears wg0 down.
    - name: Install wg reconcile wrapper script
      copy:
        dest: /usr/local/lib/cluster/wg-reconcile
        mode: '0755'
        content: |
          #!/bin/bash
          # Bring wg0 up iff this host currently owns the gateway VIP.
          set -euo pipefail
          VIP="{{ gateway_vip }}"
          if ip -4 -o addr show | awk '{print $4}' | grep -q "^${VIP}/"; then
              exec ycluster wg reconcile --up
          else
              exec ycluster wg reconcile --down
          fi

    - name: Install wg-reconcile systemd service
      copy:
        dest: /etc/systemd/system/ycluster-wg-reconcile.service
        mode: '0644'
        content: |
          [Unit]
          Description=YCluster WireGuard reconcile (VIP-aware)
          After=network-online.target keepalived.service
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/lib/cluster/wg-reconcile

    - name: Install wg-reconcile systemd timer
      copy:
        dest: /etc/systemd/system/ycluster-wg-reconcile.timer
        mode: '0644'
        content: |
          [Unit]
          Description=Periodic WireGuard reconcile

          [Timer]
          OnBootSec=30s
          OnUnitActiveSec={{ wg_reconcile_interval }}
          AccuracySec=1s

          [Install]
          WantedBy=timers.target
      notify: reload systemd

    - name: Enable and start wg-reconcile timer
      systemd:
        name: ycluster-wg-reconcile.timer
        enabled: yes
        state: started
        daemon_reload: yes

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

# The wg peer subnet route (10.0.1.0/24 via gateway_vip) is now declared
# in the netplan template (admin/templates/netplan-cluster.yaml.j2) and
# applied by configure-netplan.yml. networkd installs the route
# unconditionally at boot — no on-link validation, no rc.local race.
#
# This play removes the old rc.local lines that did the same job.
- name: Remove legacy rc.local wg peer route entries
  hosts: storage:compute
  become: yes
  tasks:
    - name: Remove old rc.local wg route line
      lineinfile:
        path: /etc/rc.local
        line: 'ip -4 route add {{ wg_peer_subnet }} via {{ gateway_vip }} metric {{ wg_route_metric }} 2>/dev/null || true'
        state: absent
      when: ansible_facts['os_family'] == 'Debian'
