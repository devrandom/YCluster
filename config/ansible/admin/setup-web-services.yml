---
- name: Setup web services on managed cluster nodes
  hosts: managed
  become: yes
  vars:
    admin_services_dir: /opt/admin-services
    
  tasks:
    - name: Install net-tools package for arp command
      apt:
        name:
          - net-tools
          - python3-waitress
        state: present

    - name: Ensure etcd-client group exists
      group:
        name: etcd-client
        system: yes

    - name: Create admin-api system user
      user:
        name: admin-api
        system: yes
        shell: /usr/sbin/nologin
        home: "{{ admin_services_dir }}"
        create_home: no
        # shadow: /autoinstall/user-data reads the ubuntu password hash from
        # /etc/shadow (root:shadow 640). etcd-client: read access to the etcd
        # client TLS key (root:etcd-client 640).
        groups: [shadow, etcd-client]
        append: yes

    - name: Remove the admin-api sudoers grants (superseded by the read-only ceph identity)
      file:
        path: /etc/sudoers.d/admin-api
        state: absent

    - name: Copy etcd-based allocation API
      copy:
        src: "files/app.py"
        dest: "{{ admin_services_dir }}/app.py"
        mode: '0644'
      notify: restart admin-api

    # Admin API now uses the YCluster package directly
    # No need to link common utilities

    - name: Create Flask templates directory
      file:
        path: "{{ admin_services_dir }}/templates"
        state: directory
        mode: '0755'

    - name: Copy Flask templates
      synchronize:
        src: "templates/"
        dest: "{{ admin_services_dir }}/templates/"
        delete: yes
        rsync_opts:
          - "--checksum"
          - "--no-owner"
          - "--no-group"
          - "--chmod=F0644"
      notify: restart admin-api

    - name: Create static files directory
      file:
        path: "{{ admin_services_dir }}/static"
        state: directory
        mode: '0755'

    - name: Copy Alpine.js static file
      copy:
        src: "static/alpine-3.14.1.min.js"
        dest: "{{ admin_services_dir }}/static/alpine-3.14.1.min.js"
        mode: '0644'
      notify: restart admin-api

    - name: Create systemd service for admin API
      copy:
        dest: /etc/systemd/system/admin-api.service
        content: |
          [Unit]
          Description=Admin API Service
          After=network.target etcd.service
          Wants=etcd.service

          [Service]
          Type=simple
          EnvironmentFile=/etc/ycluster/etcd-client.env
          ExecStart=/usr/bin/python3 {{ admin_services_dir }}/app.py
          StandardOutput=journal
          StandardError=journal
          Restart=always
          RestartSec=5
          User=admin-api
          Group=admin-api
          NoNewPrivileges=yes
          ProtectSystem=strict
          ProtectHome=yes
          PrivateTmp=yes

          [Install]
          WantedBy=multi-user.target
      notify: restart admin-api

    - name: Create SSL directory for nginx
      file:
        path: /etc/nginx/ssl
        state: directory
        mode: '0700'
        owner: root
        group: root

    - name: Create TLS certificate fetch wrapper script
      copy:
        dest: /usr/local/lib/cluster/fetch-tls-certs
        mode: '0755'
        owner: root
        group: root
        content: |
          #!/bin/bash
          exec ycluster tls fetch-certs "$@"

    - name: Create nginx template directory
      file:
        path: /etc/nginx/templates
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Configure nginx with HTTPS support (template only)
      copy:
        src: admin-api.conf.j2
        dest: /etc/nginx/templates/admin-api.conf.j2
      register: nginx_template_changed

    - name: Configure nginx shared locations
      copy:
        src: admin-api-locations.conf
        dest: /etc/nginx/admin-api-locations.conf
      register: nginx_locations_changed
      notify: restart nginx

    - name: Configure nginx public (internet-facing) locations
      copy:
        src: admin-api-public-locations.conf
        dest: /etc/nginx/admin-api-public-locations.conf
      notify: restart nginx

    - name: Install shared grafana proxy snippet
      copy:
        src: admin-api-grafana-proxy.conf
        dest: /etc/nginx/admin-api-grafana-proxy.conf
      notify: restart nginx

    - name: Install nginx rate-limit zones for public paths
      copy:
        src: admin-api-ratelimit.conf
        dest: /etc/nginx/conf.d/admin-api-ratelimit.conf
      notify: restart nginx

    - name: Update nginx configuration with certbot-manager
      command: "/usr/local/bin/certbot-manager update-nginx{% if web_services_force_local | default(false) or 'storage' not in group_names %} --local{% endif %}"
      environment: "{{ etcd_client_env }}"
      register: nginx_update_result
      changed_when: "'configuration updated' in nginx_update_result.stdout"
      failed_when: nginx_update_result.rc != 0
      notify: restart nginx

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/admin-api
        dest: /etc/nginx/sites-enabled/admin-api
        state: link
      notify: restart nginx

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: restart nginx

    # Fetch certs from etcd before nginx restarts; otherwise on a fresh
    # storage node nginx fails to start because /etc/nginx/ssl/key.pem
    # doesn't exist yet. Only storage nodes hold cluster TLS certs in etcd.
    - name: Fetch initial TLS certificates
      command: /usr/local/lib/cluster/fetch-tls-certs
      environment: "{{ etcd_client_env }}"
      register: fetch_result
      failed_when: fetch_result.rc != 0
      changed_when: "'Certificates updated' in fetch_result.stdout"
      # Dev (web_services_force_local) has no cluster TLS certs in etcd, so skip.
      when: "'storage' in group_names and not (web_services_force_local | default(false))"

    - name: Flush handlers to restart nginx immediately
      meta: flush_handlers

    - name: Create autoinstall directory
      file:
        path: /var/www/html/autoinstall
        state: directory
        mode: '0755'

    - name: Copy all assets to web directory
      copy:
        src: "assets/"
        dest: /var/www/html/assets/
        mode: preserve

    - name: Copy index.html for web interface
      copy:
        src: "index.html"
        dest: /var/www/html/index.html
        mode: '0644'

    - name: Copy embedded Utilization dashboard page
      copy:
        src: "dashboard.html"
        dest: /var/www/html/dashboard.html
        mode: '0644'

    - name: Copy ansible SSH public key
      copy:
        src: "{{ bootstrap_files_dir }}/ansible_ssh_key.pub"
        dest: /var/www/html/ansible_ssh_key.pub
        mode: '0644'

    - name: Enable and start common web services
      systemd:
        name: "{{ item }}"
        enabled: yes
        state: started
        daemon_reload: yes
      loop:
        - admin-api
        - nginx

  handlers:
    - name: restart admin-api
      systemd:
        name: admin-api
        state: restarted
        daemon_reload: yes

    - name: restart nginx
      systemd:
        name: nginx
        state: restarted

- name: Storage web services
  hosts: storage
  become: yes
  tasks:
    # Read-only ceph identity for admin-api's health check, so it needs
    # neither the admin keyring nor sudo. get-or-create is idempotent and
    # returns the existing key on re-runs.
    - name: Create read-only ceph identity for admin-api
      command: ceph auth get-or-create client.admin-api mon 'allow r'
      register: ceph_admin_api_identity
      changed_when: false
      failed_when: false

    - name: Install admin-api ceph keyring
      copy:
        content: "{{ ceph_admin_api_identity.stdout }}\n"
        dest: /etc/ceph/ceph.client.admin-api.keyring
        owner: root
        group: admin-api
        mode: '0640'
      when: ceph_admin_api_identity.rc == 0
      notify: restart admin-api

    - name: Create systemd timer for certificate refresh
      copy:
        dest: /etc/systemd/system/fetch-tls-certs.timer
        content: |
          [Unit]
          Description=Fetch TLS certificates from etcd
          Requires=fetch-tls-certs.service
          
          [Timer]
          OnCalendar=hourly
          Persistent=true
          
          [Install]
          WantedBy=timers.target

    - name: Create systemd service for certificate refresh
      copy:
        dest: /etc/systemd/system/fetch-tls-certs.service
        content: |
          [Unit]
          Description=Fetch TLS certificates from etcd
          After=network.target

          [Service]
          Type=oneshot
          EnvironmentFile=/etc/ycluster/etcd-client.env
          ExecStart=/usr/local/lib/cluster/fetch-tls-certs
          ExecStartPost=/bin/systemctl reload nginx

    - name: Enable and start TLS fetch timer
      systemd:
        name: fetch-tls-certs.timer
        enabled: yes
        state: started
        daemon_reload: yes

  handlers:
    - name: restart admin-api
      systemd:
        name: admin-api
        state: restarted
