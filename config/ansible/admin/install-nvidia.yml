---
- name: Install NVIDIA driver and CUDA on Nvidia GPU nodes
  hosts: nvidia
  become: yes
  vars:
    cuda_version: "12-9"
    # Blackwell GPUs require open kernel modules - proprietary driver unsupported
    nvidia_driver_package: "nvidia-open"
    # Default power limit in watts (max for RTX PRO 6000 Blackwell is 600)
    nvidia_power_limit_watts: 300
  tasks:
    - name: Display NVIDIA GPU status
      debug:
        msg: "NVIDIA GPU detected: {{ ansible_local.gpu.has_nvidia_gpu | default(false) }}"

    - name: End play for nodes without NVIDIA GPU
      meta: end_host
      when: not (ansible_local.gpu.has_nvidia_gpu | default(false))

    - name: Install prerequisites
      apt:
        name:
          - build-essential
          - dkms
          - linux-headers-{{ ansible_facts['kernel'] }}
          - pkg-config
          - libglvnd-dev
        state: present
        update_cache: yes

    - name: Ensure /var/cache/ycluster exists
      file:
        path: /var/cache/ycluster
        state: directory
        mode: '0755'

    # Keep the keyring deb cached in a persistent path; acts as a sentinel
    # that the CUDA repo is already wired up. Re-runs skip the download and
    # the apt-cache refresh unless the keyring actually changed.
    - name: Cache the CUDA keyring deb
      get_url:
        url: https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
        dest: /var/cache/ycluster/cuda-keyring_1.1-1_all.deb
        mode: '0644'
      register: cuda_keyring_dl

    - name: Install CUDA keyring package
      apt:
        deb: /var/cache/ycluster/cuda-keyring_1.1-1_all.deb
        state: present
      register: cuda_keyring_install

    - name: Update apt cache after adding CUDA repo
      apt:
        update_cache: yes
      when: cuda_keyring_install is changed

    - name: Install CUDA toolkit
      apt:
        name: cuda-toolkit-{{ cuda_version }}
        state: present
      register: cuda_install

    - name: Install NVIDIA open kernel modules
      apt:
        name: "{{ nvidia_driver_package }}"
        state: present
      register: driver_install

    # On a fresh node's first boot (before the driver was installed) nouveau
    # claims the GPUs. It must be unloaded before the container toolkit's
    # postinst probes the GPU with nvidia-smi, otherwise modprobe nvidia wedges
    # in uninterruptible sleep trying to bind devices nouveau still holds, which
    # deadlocks the whole apt transaction. Installing the driver above lays down
    # the nouveau blacklist and rebuilds the initramfs, so a reboot clears it.
    - name: Check whether nouveau is loaded
      command: lsmod
      register: lsmod_out
      changed_when: false

    - name: Stat the nvidia-shipped nouveau blacklist
      stat:
        path: /usr/lib/modprobe.d/nvidia-graphics-drivers.conf
      register: nouveau_blacklist
      when: "'nouveau' in lsmod_out.stdout"

    - name: Fail if nouveau is loaded without a blacklist in place
      fail:
        msg: >-
          nouveau is loaded but /usr/lib/modprobe.d/nvidia-graphics-drivers.conf
          is missing; a reboot would not unload it. Check the
          {{ nvidia_driver_package }} install.
      when:
        - "'nouveau' in lsmod_out.stdout"
        - not nouveau_blacklist.stat.exists

    - name: Reboot to unload nouveau before configuring the container toolkit
      reboot:
        reboot_timeout: 600
      when: "'nouveau' in lsmod_out.stdout"

    - name: Install NVIDIA container toolkit
      apt:
        name: nvidia-container-toolkit
        state: present

    - name: Configure CUDA PATH for all users
      copy:
        dest: /etc/profile.d/cuda.sh
        mode: '0644'
        content: |
          export PATH=/usr/local/cuda/bin:$PATH
          export LD_LIBRARY_PATH=/usr/local/cuda/lib64:$LD_LIBRARY_PATH

    - name: Enable NVIDIA persistence daemon
      systemd:
        name: nvidia-persistenced
        enabled: yes
        state: started
      failed_when: false

    - name: Restart Docker to pick up container toolkit
      systemd:
        name: docker
        state: restarted
      failed_when: false

    - name: Verify NVIDIA driver loaded
      command: nvidia-smi
      register: nvidia_smi
      changed_when: false
      failed_when: false

    - name: Display nvidia-smi output
      debug:
        msg: "{{ nvidia_smi.stdout_lines }}"
      when: nvidia_smi.rc == 0

    - name: Install nvidia-power-limit script
      copy:
        src: files/scripts/nvidia-power-limit
        dest: /usr/local/sbin/nvidia-power-limit
        mode: '0755'
        owner: root
        group: root

    - name: Install nvidia-power-limit systemd service
      copy:
        dest: /etc/systemd/system/nvidia-power-limit.service
        mode: '0644'
        content: |
          [Unit]
          Description=Set NVIDIA GPU power limits
          After=nvidia-persistenced.service
          Wants=nvidia-persistenced.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/usr/local/sbin/nvidia-power-limit {{ '--max' if nvidia_power_limit_watts >= 600 else '' }}

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Enable and start nvidia-power-limit service
      systemd:
        name: nvidia-power-limit
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Reboot required notice
      debug:
        msg: "NOTICE: Reboot required to load NVIDIA kernel modules"
      when: driver_install.changed or cuda_install.changed

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: yes
