---
- name: Setup admin user with TOTP authentication (storage)
  hosts: storage
  become: yes
  # Pulled by explicit file reference, not a group_vars/storage auto-load, so
  # it stays out of `ansible-inventory --host` dumps (vault/storage.yml).
  vars_files:
    - ../vault/storage.yml
  vars:
    admin_user: admin
    admin_uid: 2000
    admin_home: /home/admin
    admin_password: "{{ vault_admin_password }}"
    totp_label: storage
    totp_seed_host: "{{ groups['storage'][0] }}"
    totp_seed_file: /home/admin/.google_authenticator
  tasks:
    - import_tasks: setup-admin-user-tasks.yml
  handlers:
    - name: restart ssh
      systemd:
        name: ssh
        state: restarted

- name: Setup admin user with TOTP authentication (general)
  hosts: all:!storage:!macos
  become: yes
  # Pulled by explicit file reference, not a group_vars/all auto-load, so it
  # stays out of `ansible-inventory --host` dumps (vault/general.yml).
  vars_files:
    - ../vault/general.yml
  vars:
    admin_user: admin
    admin_uid: 2000
    admin_home: /home/admin
    admin_password: "{{ vault_admin_password_general }}"
    totp_label: general
    totp_seed_host: "{{ groups['storage'][0] }}"
    totp_seed_file: /home/admin/.google_authenticator.general
  tasks:
    - import_tasks: setup-admin-user-tasks.yml
  handlers:
    - name: restart ssh
      systemd:
        name: ssh
        state: restarted
