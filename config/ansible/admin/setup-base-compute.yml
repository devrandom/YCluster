---
- name: Setup base configuration for non-core managed nodes (local dnsmasq forwarder)
  hosts: compute:adhoc:nas
  become: yes

  handlers:
    - name: restart dnsmasq
      systemd:
        name: dnsmasq
        state: restarted

  tasks:
    - name: Install dnsmasq
      apt:
        name: dnsmasq
        state: present

    - name: Configure managed-node DNS (loopback + gateway fallback)
      include_tasks: tasks/configure-managed-dns.yml

    - name: Clear default dnsmasq.conf to avoid conflicts
      copy:
        dest: /etc/dnsmasq.conf
        content: |
          # Main dnsmasq configuration
          # All configuration is in /etc/dnsmasq.d/
          conf-dir=/etc/dnsmasq.d/,*.conf
          # Use additional hosts file for static DNS entries
          addn-hosts=/etc/static-hosts
          server=208.67.222.222
          server=8.8.8.8
          server=1.1.1.1
        backup: yes
      notify: restart dnsmasq

    - name: Create empty static hosts file for dnsmasq
      copy:
        dest: /etc/static-hosts
        content: ""
        force: no
        owner: root
        group: root
        mode: '0644'

    - name: Create dnsmasq configuration directory
      file:
        path: /etc/dnsmasq.d
        state: directory
        mode: '0755'
        owner: root
        group: root

    # bind-dynamic lets the dnsmasq on whichever core node currently holds
    # the gateway VIP auto-bind 10.0.0.254 — that node becomes the cluster
    # resolver. Non-core nodes never hold the VIP, so for them the flag is
    # functionally a no-op (inherited for symmetry).
    #
    # On any Incus host (VM or container), the 'incus' package drops in
    # /etc/dnsmasq.d/incus with 'bind-interfaces' + 'except-interface=incusbr0'
    # so the host dnsmasq does not fight the Incus-internal dnsmasq on
    # incusbr0. dnsmasq refuses to combine bind-interfaces with
    # bind-dynamic, so on those hosts we drop bind-dynamic and let the
    # Incus drop-in win.
    - name: Create dnsmasq configuration (DNS only)
      copy:
        dest: /etc/dnsmasq.d/dns.conf
        mode: '0644'
        content: |
          # DNS configuration
          # Forward .xc queries to gateway VIP
          server=/xc/{{ gateway_vip }}
          domain=xc
          domain-needed

          {% if not (incus_vm_host | default(false)
                     or incus_container_host | default(false)) %}
          # Dynamic binding for VIP support
          bind-dynamic
          {% else %}
          # bind-interfaces is supplied by /etc/dnsmasq.d/incus (incus pkg);
          # bind-dynamic would conflict with it and refuse to start.
          {% endif %}
          # DNS only, no DHCP
          port=53
      notify: restart dnsmasq

    - name: Enable and start dnsmasq service
      systemd:
        name: dnsmasq
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Ensure dev user exists
      user:
        name: dev
        shell: /bin/bash
        create_home: yes
        groups:
          - render
          - video
        append: yes

    - name: Install astral-uv snap
      community.general.snap:
        name: astral-uv
        classic: yes

    - name: Install huggingface-cli as a uv tool
      command: /snap/bin/uv tool install --upgrade huggingface_hub
      become_user: dev
      environment:
        HOME: /home/dev
      register: hf_install
      changed_when: "'Installed' in hf_install.stdout or 'Updated' in hf_install.stdout"
