---
# Collect hardware facts for all (or selected) nodes and persist to etcd.
#
# Each node collects its own facts locally (no etcd access required), then the
# etcd write is delegated to a storage node. This mirrors the macOS flow and
# keeps non-core nodes (compute/nas/adhoc) off etcd entirely — etcd is being
# locked down to s* only. See docs/design/etcd-access-hardening.md.
#
# Usage:
#   ./run-playbook.sh admin/collect-hardware-facts.yml
#   ./run-playbook.sh admin/collect-hardware-facts.yml --limit s2
#   ./run-playbook.sh admin/collect-hardware-facts.yml --limit nvidia
- name: Collect hardware inventory facts
  hosts: storage:compute:nas:adhoc
  become: yes
  serial: 10   # parallel — safe, each node writes only its own etcd key

  tasks:
    - name: Ensure dmidecode is installed
      apt:
        name:
          - dmidecode
          - pciutils
          - ethtool
        state: present
      tags: packages

    - name: Collect hardware facts locally (no etcd write)
      command: ycluster inventory collect --print
      register: collect_result
      changed_when: false

    - name: Write facts JSON to temp file on storage node
      delegate_to: "{{ groups['storage'] | first }}"
      copy:
        content: "{{ collect_result.stdout }}"
        dest: "/tmp/ycluster-hw-{{ inventory_hostname }}.json"
        mode: '0600'

    - name: Persist facts to etcd via storage node
      delegate_to: "{{ groups['storage'] | first }}"
      environment: "{{ etcd_client_env }}"
      shell: >-
        ycluster inventory collect --from-file
        /tmp/ycluster-hw-{{ inventory_hostname }}.json
        --hostname {{ inventory_hostname }}
      register: write_result
      changed_when: true

    - name: Clean up temp file on storage node
      delegate_to: "{{ groups['storage'] | first }}"
      file:
        path: "/tmp/ycluster-hw-{{ inventory_hostname }}.json"
        state: absent

    - name: Show result
      debug:
        msg: "{{ write_result.stdout_lines }}"
