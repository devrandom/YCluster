---
- name: Install YCluster Python package
  hosts: managed
  become: yes
  vars:
    ycluster_package_dir: /opt/ycluster
    
  tasks:
    - name: Install Python dependencies and package tools
      apt:
        name:
          - python3-pip
          - python3-setuptools
          - python3-wheel
          - rsync
          # ycluster dependencies (prefer apt over pip)
          - python3-etcd3
          - python3-flask
          - python3-scapy
          - python3-requests
          - python3-dnspython
          - python3-cryptography
          - python3-jinja2
          - python3-netifaces
          - python3-yaml
          - python3-ntplib
          - python3-protobuf
          - python3-grpcio
          - python3-psycopg2
        state: present

    - name: Remove pip-installed packages that shadow apt versions
      pip:
        name:
          - dnspython
          - grpcio
          - itsdangerous
          - ntplib
          - protobuf
          - scapy
          - tenacity
          - typing_extensions
          - werkzeug
          - blinker
          - flask
        state: absent
        extra_args: "--break-system-packages"
      failed_when: false

    - name: Check if YCluster package is installed
      command: python3 -c "import ycluster"
      register: ycluster_check
      changed_when: false
      failed_when: false

    - name: Copy YCluster package files
      synchronize:
        src: files/ycluster/
        dest: "{{ ycluster_package_dir }}/"
        delete: yes
        recursive: yes
        rsync_opts:
          - "--checksum"
          - "--no-owner"
          - "--no-group"
          - "--chmod=D0755,F0644"
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--exclude=build"
          - "--exclude=*.egg-info"
      register: ycluster_sync

    - name: Install YCluster package (no deps - all dependencies from apt)
      pip:
        name: "{{ ycluster_package_dir }}"
        editable: no
        state: present
        extra_args: "--break-system-packages --no-deps"
      when: ycluster_check.rc != 0 or ycluster_sync.changed

    - name: Create backward compatibility wrapper scripts
      copy:
        dest: "/usr/local/bin/{{ item.script }}"
        mode: '0755'
        content: |
          #!/bin/bash
          # Backward compatibility wrapper for {{ item.script }}
          exec ycluster {{ item.command }} "$@"
      loop:
        - { script: 'certbot-manager', command: 'certbot' }
        - { script: 'tls-config', command: 'tls' }
        - { script: 'rathole-config', command: 'rathole' }

    - name: Remove obsolete wrapper scripts
      file:
        path: "/usr/local/bin/{{ item }}"
        state: absent
      loop:
        - lease-manager
        - https-config
        - frontend-manager

    - name: Ensure /etc/ycluster exists
      file:
        path: /etc/ycluster
        state: directory
        mode: '0755'

    - name: Write etcd client environment (single source of truth)
      # Referenced by systemd units via EnvironmentFile= and by shell scripts via
      # `source`. Driven by the etcd_* vars in group_vars/all/main.yml; flipping
      # etcd_tls_enabled adds the cert lines and switches the scheme to https.
      copy:
        dest: /etc/ycluster/etcd-client.env
        mode: '0644'
        content: |
          # Managed by Ansible (install-ycluster-package.yml). Do not edit.
          ETCD_HOSTS={{ etcd_hosts }}
          ETCDCTL_ENDPOINTS={{ etcdctl_endpoints }}
          {% if etcd_tls_enabled %}
          ETCD_CACERT={{ etcd_tls_dir }}/ca.crt
          ETCD_CERT={{ etcd_tls_dir }}/client.crt
          ETCD_KEY={{ etcd_tls_dir }}/client.key
          ETCDCTL_CACERT={{ etcd_tls_dir }}/ca.crt
          ETCDCTL_CERT={{ etcd_tls_dir }}/client.crt
          ETCDCTL_KEY={{ etcd_tls_dir }}/client.key
          {% endif %}

    - name: Ensure bash completion directory exists
      file:
        path: /etc/bash_completion.d
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Verify YCluster installation
      command: ycluster --version
      register: ycluster_version
      changed_when: false

    - name: Display YCluster version
      debug:
        msg: "YCluster installed successfully: {{ ycluster_version.stdout }}"

    - name: Restart admin-api if package was updated
      systemd:
        name: admin-api
        state: restarted
      when: ycluster_sync.changed
      failed_when: false

    - name: Generate bash completion script
      shell: |
        set -e
        new=$(ycluster --completion)
        old=$(cat /etc/bash_completion.d/ycluster-completion.bash 2>/dev/null || true)
        if [ "$new" != "$old" ]; then
          printf '%s\n' "$new" > /etc/bash_completion.d/ycluster-completion.bash
          echo CHANGED
        fi
      args:
        executable: /bin/bash
      register: completion_result
      changed_when: "'CHANGED' in completion_result.stdout"
