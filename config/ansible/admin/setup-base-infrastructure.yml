---
- name: Setup base infrastructure on managed cluster nodes
  hosts: managed
  become: yes
  vars:
    admin_services_dir: /opt/admin-services
    
  tasks:
    - name: Update package cache
      apt:
        cache_valid_time: 3600
      changed_when: false

    - name: Install required packages
      apt:
        name:
          - python3
          - python3-pip
          - python3-flask
          - python3-etcd3
          - python3-scapy
          - python3-requests
          - nginx
          - squid
          - dnsmasq
          - genisoimage
          - keepalived
          - chrony
          - curl
          - wget
          - git
          - cmake
          - clang
          - libcurl4-openssl-dev
        state: present

    - name: Create admin services directory
      file:
        path: "{{ admin_services_dir }}"
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Create cluster utilities directory
      file:
        path: /usr/local/lib/cluster
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Create web root directory
      file:
        path: /var/www/html
        state: directory
        mode: '0755'
        owner: www-data
        group: www-data

    - name: Clone infrastructure repository
      git:
        repo: https://gitlab.com/devrandom01/ycluster.git
        dest: /opt/infrastructure
        force: no
      ignore_errors: yes

    # Local DNS health checks resolve the bare hostname via 127.0.0.1
    # (local dnsmasq). Dnsmasq only forwards *.xc to the gateway, so
    # the short hostname must be in /etc/hosts. Nodes that were
    # re-provisioned with a new name (e.g. former c1 -> x1) can end up
    # with a stale 127.0.1.1 line; replace it.
    - name: Ensure 127.0.1.1 loopback entry matches inventory hostname
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1\s'
        line: "127.0.1.1 {{ inventory_hostname }}.xc {{ inventory_hostname }}"
        state: present
      notify: reload dnsmasq hosts

  handlers:
    # dnsmasq reads /etc/hosts at startup; nudge it to re-read when
    # we change the loopback line. SIGHUP is a no-op if dnsmasq isn't
    # running yet (first-run case on a fresh node).
    - name: reload dnsmasq hosts
      systemd:
        name: dnsmasq
        state: reloaded
      failed_when: false

- name: Storage specific setup
  hosts: storage
  become: yes

  tasks:
    - name: Set ubuntu user password
      user:
        name: ubuntu
        password: "{{ vault_ubuntu_password | password_hash('sha512') }}"
        update_password: always

    - name: Populate local node information in etcd
      command: ycluster cluster populate-local-node
      environment:
        ETCD_HOSTS: "{% for h in groups['etcd'] %}{{ hostvars[h]['ansible_host'] }}:2379{% if not loop.last %},{% endif %}{% endfor %}"
      register: populate_result
      changed_when: "'Node information updated' in populate_result.stdout"
      failed_when: populate_result.rc != 0
