---
- name: Install Docker from official Docker repository
  hosts: storage
  become: yes
  tasks:
    - name: Remove old Docker packages
      apt:
        name:
          - docker.io
          - docker-compose
          - docker-compose-v2
        state: absent

    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key (ASCII armored)
      copy:
        src: docker.gpg.asc
        dest: /tmp/docker.gpg.asc
        mode: '0644'
      changed_when: false

    - name: Import and dearmor Docker GPG key
      shell: gpg --dearmor < /tmp/docker.gpg.asc > /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Set proper permissions on GPG key
      file:
        path: /etc/apt/keyrings/docker.gpg
        mode: '0644'

    - name: Clean up temporary GPG file
      file:
        path: /tmp/docker.gpg.asc
        state: absent
      changed_when: false

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker CE and buildx
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop:
        - "{{ ansible_user }}"
      when: ansible_user is defined

    # Client-side configuration so any docker pull/build can talk to the
    # cluster's local registry. Must happen here (before app/app.yml runs)
    # rather than in storage/install-docker-registry.yml, because litellm
    # and open-webui pull from registry.xc:5000 during app deploy.
    - name: Configure Docker daemon to use local registry
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "insecure-registries": ["registry.xc:5000", "10.0.0.100:5000"],
            "registry-mirrors": ["http://10.0.0.100:5000"],
            "dns": ["10.0.0.254"]
          }
        backup: yes
      notify: restart docker

    - name: Create buildkit configuration directory
      file:
        path: /etc/buildkit
        state: directory
        mode: '0755'

    - name: Create buildkit configuration for insecure registries
      copy:
        dest: /etc/buildkit/buildkitd.toml
        content: |
          [registry."registry.xc:5000"]
            http = true
            insecure = true

          [registry."10.0.0.100:5000"]
            http = true
            insecure = true
        mode: '0644'

    - name: Create insecure buildx builder
      shell: |
        if docker buildx inspect insecure-builder >/dev/null 2>&1; then
          echo "Builder insecure-builder already exists"
        else
          docker buildx create --name insecure-builder \
            --driver docker-container \
            --driver-opt network=host \
            --config /etc/buildkit/buildkitd.toml
        fi
        docker buildx use insecure-builder
      register: buildx_result
      changed_when: "'already exists' not in buildx_result.stdout"
      failed_when: buildx_result.rc != 0

    - name: Verify Docker installation
      command: docker --version
      register: docker_version
      changed_when: false

    - name: Verify buildx installation
      command: docker buildx version
      register: buildx_version
      changed_when: false

    - name: Display versions
      debug:
        msg:
          - "Docker version: {{ docker_version.stdout }}"
          - "Buildx version: {{ buildx_version.stdout }}"

  handlers:
    - name: restart docker
      systemd:
        name: docker
        state: restarted
