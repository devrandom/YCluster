---
# Shared tasks for admin user setup. Expects these vars:
#   admin_password      - plaintext password (from vault)
#   totp_seed_host      - host where the canonical TOTP seed lives (s1)
#   totp_seed_file      - path to the seed file on totp_seed_host
#                         (for storage this *is* admin's live .google_authenticator;
#                          for general it's a separate file copied out as .google_authenticator)
#   totp_label          - short label for log/issuer ("storage", "general")

- name: Install required packages
  apt:
    name:
      - libpam-google-authenticator
      - python3-qrcode
      - qrencode
    state: present

- name: Create admin user with specific UID
  user:
    name: "{{ admin_user }}"
    uid: "{{ admin_uid }}"
    shell: /bin/bash
    home: "{{ admin_home }}"
    create_home: yes
    password: "{{ admin_password | password_hash('sha512') }}"
    state: present

- name: Add admin user to sudo group
  user:
    name: "{{ admin_user }}"
    groups: sudo
    append: yes

- name: Configure sudoers for admin user (NOPASSWD)
  copy:
    dest: /etc/sudoers.d/admin
    content: |
      # Admin user sudo access
      admin ALL=(ALL) NOPASSWD:ALL
    mode: '0440'
    validate: 'visudo -cf %s'

- name: Check if TOTP seed already exists on seed host
  stat:
    path: "{{ totp_seed_file }}"
  register: totp_seed_stat
  run_once: yes
  delegate_to: "{{ totp_seed_host }}"

- name: Generate TOTP seed on seed host
  shell: |
    sudo -u {{ admin_user }} google-authenticator -t -d -f -r 3 -R 30 -w 3 -q -Q UTF8 -s {{ totp_seed_file }}
  args:
    creates: "{{ totp_seed_file }}"
  when: not totp_seed_stat.stat.exists
  run_once: yes
  delegate_to: "{{ totp_seed_host }}"

- name: Read TOTP seed from seed host
  slurp:
    src: "{{ totp_seed_file }}"
  register: totp_seed_content
  run_once: yes
  delegate_to: "{{ totp_seed_host }}"
  no_log: true

- name: Create SSH directory for admin user
  file:
    path: "{{ admin_home }}/.ssh"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0700'

- name: Install TOTP configuration on all hosts in this play
  copy:
    content: "{{ totp_seed_content.content | b64decode }}"
    dest: "{{ admin_home }}/.google_authenticator"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0600'
  no_log: true

- name: Install TOTP label sidecar (used by show-admin-totp for the QR account name)
  copy:
    content: "{{ totp_label }}\n"
    dest: "{{ admin_home }}/.google_authenticator.label"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0644'

- name: Configure PAM for TOTP on console login
  lineinfile:
    path: /etc/pam.d/login
    line: "auth required pam_google_authenticator.so nullok"
    insertafter: "^@include common-auth"
    state: present

- name: Comment out common-auth include in sshd PAM
  lineinfile:
    path: /etc/pam.d/sshd
    regexp: '^(@include common-auth)$'
    line: '# \1  # Disabled - using inline auth below'
    backrefs: yes
  notify: restart ssh

- name: Configure PAM for SSH - replace common-auth with inline password check
  blockinfile:
    path: /etc/pam.d/sshd
    marker: "# {mark} ANSIBLE MANAGED - Password and TOTP"
    insertafter: "^# @include common-auth  # Disabled"
    block: |
      # Check password first, then TOTP in single keyboard-interactive session
      auth required pam_unix.so nullok
      auth required pam_google_authenticator.so nullok echo_verification_code
  notify: restart ssh

- name: Remove cloud-init SSH password restriction
  file:
    path: /etc/ssh/sshd_config.d/50-cloud-init.conf
    state: absent
  notify: restart ssh

- name: Configure SSH to allow publickey OR keyboard-interactive for admin, disable password for root
  blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} ANSIBLE MANAGED - TOTP Configuration"
    block: |
      # Disable password authentication for root
      Match User root
          PasswordAuthentication no
      # Allow either publickey alone OR keyboard-interactive (password+TOTP) for admin user
      Match User admin
          AuthenticationMethods publickey keyboard-interactive
      Match all
    validate: '/usr/sbin/sshd -t -f %s'
  notify: restart ssh

- name: Enable challenge-response authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?KbdInteractiveAuthentication'
    line: 'KbdInteractiveAuthentication yes'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: restart ssh

- name: Enable password authentication globally
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication yes'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: restart ssh

- name: Enable PAM for SSH
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?UsePAM'
    line: 'UsePAM yes'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: restart ssh

- name: Copy ansible SSH public key for admin user
  copy:
    src: /opt/bootstrap-files/ansible_ssh_key.pub
    dest: "{{ admin_home }}/.ssh/authorized_keys"
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: '0600'

- name: Install show-admin-totp utility
  copy:
    src: files/scripts/show-admin-totp
    dest: /usr/local/bin/show-admin-totp
    mode: '0755'
    owner: root
    group: root

- name: Display TOTP enrollment information
  debug:
    msg: |
      ========================================
      Admin User TOTP Configuration ({{ totp_label }})
      ========================================
      Username: admin
      Password: (from vault)
      TOTP secret seed file (on {{ totp_seed_host }}): {{ totp_seed_file }}

      To display the QR code, run on any host in this group:
        show-admin-totp
      ========================================
  run_once: yes
