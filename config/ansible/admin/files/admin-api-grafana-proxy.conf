# Shared proxy directives for /grafana/, included from both the
# cluster-internal (admin-api-locations.conf) and public
# (admin-api-public-locations.conf) location blocks. Keep this file free
# of a wrapping `location` so each caller can add its own directives
# (e.g. limit_req on the public side) before the include.

proxy_pass http://localhost:3030/grafana/;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;

# Prevent redirect loops when Grafana sends absolute Location headers.
proxy_redirect http://localhost:3030/grafana/ /grafana/;
proxy_redirect http://localhost:3030/ /grafana/;

# Allow embedding and strip Grafana's own X-Frame-Options.
proxy_hide_header X-Frame-Options;
add_header X-Frame-Options SAMEORIGIN;

# WebSocket support for live dashboard updates.
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";
