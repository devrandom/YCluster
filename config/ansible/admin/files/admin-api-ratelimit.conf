# Rate-limit zones for the publicly-exposed admin-api paths.
#
# IMPORTANT: rathole 0.5.0 has no PROXY protocol support, so external
# clients coming in through the rathole tunnel all appear to nginx as
# source 127.0.0.1. That means $binary_remote_addr collapses to a single
# shared key and these zones act as GLOBAL rate caps rather than per-
# client limits. Sizes below are picked to:
#   - absorb legitimate concurrent remote-node bootstraps (each polling
#     every 5s for up to an hour), and
#   - still meaningfully cap abusive floods.
#
# When rathole gains PROXY protocol support (see TODO.md), set
# `set_real_ip_from 127.0.0.1; real_ip_header proxy_protocol;` on the
# public vhost and tighten these limits back to per-client semantics.

limit_req_zone $binary_remote_addr zone=wg_register:10m   rate=60r/m;
limit_req_zone $binary_remote_addr zone=wg_poll:10m       rate=600r/m;
limit_req_zone $binary_remote_addr zone=public_status:10m rate=300r/m;
