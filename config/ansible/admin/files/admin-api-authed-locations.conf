# Authenticated admin-api location blocks (forward-auth via the cluster
# IdP). Served from the PUBLIC vhost: browsers get redirected through
# authentik's embedded outpost on first visit; authenticated requests
# reach the Flask app with X-Authentik-Email / X-Authentik-Groups set
# (via the shared admin-api-authentik-proxy.conf snippet). Access
# requires membership of the `ycluster-admins` group (policy bound to
# the application in authentik) — `ycluster user admin <email>`.
#
# NOTE: identity headers are an *external-user* authentication mechanism,
# not an internal privilege boundary — admin-api on :12723 stays directly
# reachable inside the cluster, where callers are root-equivalent anyway.
#
# authentik runs on the storage leader, which is also the node the rathole
# tunnel lands on, so 127.0.0.1:9300 is correct wherever this vhost
# actually receives public traffic.

# --- forward-auth plumbing -------------------------------------------------

# Outpost endpoints used by the browser (login start, OAuth callback,
# sign-out). Must be publicly reachable.
location ^~ /outpost.goauthentik.io/ {
    limit_req zone=public_status burst=20 nodelay;
    proxy_pass http://127.0.0.1:9300;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Subrequest target for auth_request — never exposed directly.
location = /outpost.goauthentik.io/auth/nginx {
    internal;
    proxy_pass http://127.0.0.1:9300;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Host $host;
    proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
}

location @authentik_signin {
    return 302 /outpost.goauthentik.io/start?rd=$scheme://$http_host$request_uri;
}

# --- protected pages + their data APIs --------------------------------------

location = /inventory {
    limit_except GET HEAD { deny all; }
    limit_req zone=public_status burst=20 nodelay;
    include /etc/nginx/admin-api-authentik-proxy.conf;
}

location = /api/inventory {
    limit_except GET HEAD { deny all; }
    limit_req zone=public_status burst=20 nodelay;
    include /etc/nginx/admin-api-authentik-proxy.conf;
}

location = /api/inventory/export.csv {
    limit_except GET HEAD { deny all; }
    limit_req zone=public_status burst=5 nodelay;
    include /etc/nginx/admin-api-authentik-proxy.conf;
}

location ~ ^/api/inventory/(hardware|asset)/[^/]+$ {
    limit_except GET HEAD { deny all; }
    limit_req zone=public_status burst=20 nodelay;
    include /etc/nginx/admin-api-authentik-proxy.conf;
}

# Dashboards under /admin/ (model-usage page + its data/options APIs,
# and future admin pages).
location ^~ /admin/ {
    limit_except GET HEAD { deny all; }
    limit_req zone=public_status burst=20 nodelay;
    include /etc/nginx/admin-api-authentik-proxy.conf;
}
