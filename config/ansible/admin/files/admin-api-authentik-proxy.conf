# Shared forward-auth + proxy directives for IdP-protected admin pages.
# Include inside a location block, after its limit_except / limit_req
# lines (same pattern as admin-api-grafana-proxy.conf). Requests that
# pass auth reach the Flask app with X-Authentik-Email / -Groups set;
# unauthenticated browsers are redirected to login via @authentik_signin
# (defined in admin-api-authed-locations.conf).

auth_request /outpost.goauthentik.io/auth/nginx;
error_page 401 = @authentik_signin;
auth_request_set $authentik_email $upstream_http_x_authentik_email;
auth_request_set $authentik_groups $upstream_http_x_authentik_groups;

proxy_pass http://127.0.0.1:12723;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Authentik-Email $authentik_email;
proxy_set_header X-Authentik-Groups $authentik_groups;
