# Shared authentik embedded-outpost plumbing for forward-auth vhosts.
# Included by every host that gates pages behind the cluster IdP (the
# public admin locations and the app.<domain> vhost). The outpost picks
# the matching application/policy by the request Host, so the same plumbing
# serves admin.<domain> (admin-group gated) and app.<domain> (open to all
# enrolled users). authentik runs on the storage leader = the rathole
# tunnel node, so 127.0.0.1:9300 is correct wherever public traffic lands.

# Outpost endpoints used by the browser (login start, OAuth callback,
# sign-out). Must be publicly reachable.
location ^~ /outpost.goauthentik.io/ {
    limit_req zone=public_status burst=20 nodelay;
    proxy_pass http://127.0.0.1:9300;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Subrequest target for auth_request — never exposed directly.
location = /outpost.goauthentik.io/auth/nginx {
    internal;
    proxy_pass http://127.0.0.1:9300;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Host $host;
    proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
}

location @authentik_signin {
    return 302 /outpost.goauthentik.io/start?rd=$scheme://$http_host$request_uri;
}
