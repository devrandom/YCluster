# Public admin-api location blocks.
# Everything NOT matched here falls through to a subnet-restricted
# `location /` in admin-api.conf.j2 and is reachable only from the
# cluster network. Matches here are reachable from the public internet
# via the reverse proxy.
#
# Rules of thumb:
#   - method allowlisting via `limit_except` (reject anything unexpected)
#   - rate limits on every public path
#   - proxy_pass always to the local Flask app (admin-api on 12723)

# --- WireGuard remote-node bootstrap flow ---------------------------------

location = /bootstrap/wg {
    limit_except GET { deny all; }
    limit_req zone=wg_register burst=5 nodelay;
    proxy_pass http://127.0.0.1:12723;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /bootstrap/wg-macos {
    limit_except GET { deny all; }
    limit_req zone=wg_register burst=5 nodelay;
    proxy_pass http://127.0.0.1:12723;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /api/wg/register {
    limit_except POST { deny all; }
    limit_req zone=wg_register burst=5 nodelay;
    proxy_pass http://127.0.0.1:12723;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ~ ^/api/wg/poll/ {
    limit_except GET { deny all; }
    limit_req zone=wg_poll burst=30 nodelay;
    proxy_pass http://127.0.0.1:12723;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- Liveness probe -------------------------------------------------------
# Lightweight app-liveness endpoint for the external blackbox probe:
# proxies to Flask (not a static file) so the probe exercises the full
# path and fails if the app is down. Body is validated probe-side.
location = /api/ping {
    limit_except GET HEAD { deny all; }
    limit_req zone=public_status burst=20 nodelay;
    proxy_pass http://127.0.0.1:12723;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- Public landing page --------------------------------------------------
# The status page + its data API (/status, /api/cluster-status) moved
# behind forward-auth — see admin-api-authed-locations.conf.

# Serve the static YCluster index page at /.
location = / {
    limit_except GET HEAD { deny all; }
    limit_req zone=public_status burst=20 nodelay;
    root /var/www/html;
    try_files /index.html =404;
}


location ^~ /assets/ {
    limit_except GET HEAD { deny all; }
    limit_req zone=public_status burst=20 nodelay;
    root /var/www/html;
}

location ^~ /static/ {
    limit_except GET HEAD { deny all; }
    limit_req zone=public_status burst=40 nodelay;
    proxy_pass http://127.0.0.1:12723;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Explicit deny for internal-only write/management endpoints.
# These already fall through to the subnet-restricted catch-all, but
# naming them here makes the intent unambiguous.
location ~ ^/api/(drain|undrain)(/|$) {
    return 403;
}

# Inventory pages/endpoints and /admin/ dashboards moved behind
# forward-auth — see admin-api-authed-locations.conf.

# Pages that moved under /admin/ (2026-06) — point old bookmarks there;
# the authed class picks them up after the redirect.
location = /inventory {
    return 301 /admin/inventory;
}
location = /dashboard.html {
    return 301 /admin/utilization;
}

# Grafana and the Utilization kiosk moved behind forward-auth — see
# admin-api-authed-locations.conf.
