<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Usage</title>
  <script src="/static/alpine-3.14.1.min.js" defer></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; background: #111; color: #eee; }
    h1 { margin-bottom: 1.5rem; }
    .filters { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
    .filters label { display: flex; flex-direction: column; font-size: 0.85rem; color: #aaa; }
    .filters input, .filters select { padding: 0.4rem 0.6rem; border-radius: 4px; border: 1px solid #444; background: #222; color: #eee; }
    button { padding: 0.4rem 1rem; border-radius: 4px; border: none; background: #3b82f6; color: white; cursor: pointer; }
    button:hover { background: #2563eb; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.5rem 1rem; border-bottom: 1px solid #333; color: #888; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; }
    th:hover { color: #aaa; }
    td { padding: 0.6rem 1rem; border-bottom: 1px solid #222; }
    tr:hover { background: #1a1a1a; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .empty { color: #666; font-style: italic; padding: 2rem; text-align: center; }
    .summary { margin-bottom: 1rem; color: #888; font-size: 0.9rem; }
  </style>
</head>
<body x-data="usageApp()" x-init="init()">
  <h1>Model Usage</h1>

  <form class="filters" @submit.prevent="submit()">
    <label>Days<input type="number" x-model="since" min="1" max="90" step="1"></label>
    <label>User<input type="text" x-model="user" placeholder="any"></label>
    <label>Model<input type="text" x-model="model" placeholder="any"></label>
    <button type="submit">Filter</button>
  </form>

  <template x-if="loading">
    <p class="summary">Loading...</p>
  </template>

  <template x-if="!loading && rows.length === 0">
    <p class="empty">No data for selected period</p>
  </template>

  <template x-if="!loading && rows.length > 0">
    <div>
      <p class="summary" x-text="`Showing ${rows.length} rows over ${daysLabel}`"></p>
      <table>
        <thead>
          <tr>
            <th @click="sort='user'">User</th>
            <th @click="sort='model'">Model</th>
            <th @click="sort='date'">Date</th>
            <th @click="sort='requests'" class="num">Requests</th>
            <th @click="sort='avg_duration'" class="num">Avg ms</th>
            <th @click="sort='bytes'" class="num">Bytes out</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="row in sortedRows" :key="row.user + row.model + row.date">
            <tr>
              <td x-text="row.user"></td>
              <td x-text="row.model"></td>
              <td x-text="row.date"></td>
              <td class="num" x-text="row.requests.toLocaleString()"></td>
              <td class="num" x-text="Math.round(row.avg_duration).toLocaleString()"></td>
              <td class="num" x-text="formatBytes(row.bytes)"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </template>

  <script>
    function usageApp() {
      return {
        rows: [],
        loading: false,
        since: {{ since_days }},
        user: '{{ user_filter }}',
        model: '{{ model_filter }}',

        init() {
          this.fetchRows()
        },

        submit() {
          this.fetchRows()
        },

        fetchRows() {
          this.loading = true
          const params = new URLSearchParams({ since: this.since })
          if (this.user) params.set('user', this.user)
          if (this.model) params.set('model', this.model)
          fetch(`/admin/model-usage/data?${params}`)
            .then(r => r.json())
            .then(data => { this.rows = data; this.loading = false })
            .catch(() => { this.rows = []; this.loading = false })
        },

        get sortedRows() {
          return [...this.rows].sort((a, b) => {
            switch (this.sort) {
              case 'user': return a.user.localeCompare(b.user)
              case 'model': return a.model.localeCompare(b.model)
              case 'date': return b.date.localeCompare(a.date)
              case 'requests': return b.requests - a.requests
              case 'avg_duration': return b.avg_duration - a.avg_duration
              case 'bytes': return b.bytes - a.bytes
              default: return 0
            }
          })
        },

        get daysLabel() {
          return this.since === 1 ? 'last 24h' : `last ${this.since} days`
        },

        formatBytes(b) {
          if (b === undefined || b === null) return '0'
          b = Number(b)
          if (b < 1024) return b.toLocaleString()
          if (b < 1024 ** 2) return `${(b / 1024).toFixed(1)}K`
          if (b < 1024 ** 3) return `${(b / 1024 ** 2).toFixed(1)}M`
          return `${(b / 1024 ** 3).toFixed(2)}G`
        }
      }
    }
  </script>
</body>
</html>
