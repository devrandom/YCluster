---
# Collect hardware facts for macOS nodes and persist to etcd.
#
# ycluster is not installed on macOS nodes, so we:
#   1. Copy a Python collection script to the macOS node
#   2. Run it (uses system_profiler + sysctl), capture JSON output
#   3. Copy the JSON to a storage node and write to etcd via ycluster
#
# Usage:
#   ./run-playbook.sh admin/collect-hardware-facts-macos.yml
#   ./run-playbook.sh admin/collect-hardware-facts-macos.yml --limit m1

- name: Collect hardware facts from macOS nodes
  hosts: macos
  become: no
  gather_facts: no

  tasks:
    - name: Install collection script
      become: yes
      copy:
        src: files/scripts/collect-hw-macos.py
        dest: /usr/local/ycluster/collect-hw-macos
        mode: '0755'

    - name: Run collection script
      command: python3 /usr/local/ycluster/collect-hw-macos
      register: facts_result
      changed_when: false

    - name: Write facts JSON to temp file on storage node
      delegate_to: "{{ groups['storage'] | first }}"
      copy:
        content: "{{ facts_result.stdout }}"
        dest: "/tmp/ycluster-hw-{{ inventory_hostname }}.json"
        mode: '0600'

    - name: Persist facts to etcd via storage node
      delegate_to: "{{ groups['storage'] | first }}"
      environment:
        ETCD_HOSTS: "{% for h in groups['etcd'] %}{{ hostvars[h]['ansible_host'] }}:2379{% if not loop.last %},{% endif %}{% endfor %}"
      shell: >-
        ycluster inventory collect --from-file
        /tmp/ycluster-hw-{{ inventory_hostname }}.json
        --hostname {{ inventory_hostname }}
      register: write_result
      changed_when: true

    - name: Clean up temp file on storage node
      delegate_to: "{{ groups['storage'] | first }}"
      file:
        path: "/tmp/ycluster-hw-{{ inventory_hostname }}.json"
        state: absent

    - name: Show result
      debug:
        msg: "{{ write_result.stdout_lines }}"
