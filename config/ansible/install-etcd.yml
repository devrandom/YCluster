---
- name: Install and configure etcd
  hosts: etcd
  become: yes
  vars:
    etcd_data_dir: "/var/lib/etcd"
    # Phase-driven scheme/ports come from group_vars/all (or the dev inventory):
    # etcd_scheme, etcd_client_port, etcd_peer_port reflect what clients/peers
    # should USE this phase; the listeners themselves are rendered by the
    # etcd.default.j2 template from the phase flags. When clients talk TLS,
    # prefix etcdctl with the client cert env.
    etcdctl_tls_env: "{{ ('ETCDCTL_CACERT=' ~ etcd_tls_dir ~ '/ca.crt ETCDCTL_CERT=' ~ etcd_tls_dir ~ '/client.crt ETCDCTL_KEY=' ~ etcd_tls_dir ~ '/client.key ') if (etcd_client_tls | default(false)) else '' }}"

  tasks:
    - name: Install etcd from apt
      apt:
        name: 
          - etcd-server
          - etcd-client
        state: present

    - name: Ensure etcd data directory has correct permissions
      file:
        path: "{{ etcd_data_dir }}"
        state: directory
        owner: etcd
        group: etcd
        mode: '0700'

    - name: Determine cluster configuration
      set_fact:
        etcd_cluster_size: "{{ groups['etcd'] | length }}"
        etcd_initial_cluster: "{{ groups['etcd'] | map('extract', hostvars, 'inventory_hostname') | zip(groups['etcd'] | map('extract', hostvars, 'ansible_host')) | map('join', '=' ~ etcd_scheme ~ '://') | map('regex_replace', '$', ':' ~ etcd_peer_port) | join(',') }}"

    - name: Check if etcd data directory exists and has data
      stat:
        path: "{{ etcd_data_dir }}/member"
      register: etcd_data_exists

    - name: Check if ANY etcd node in cluster is already running
      shell: |
        {{ etcdctl_tls_env }}ETCDCTL_ENDPOINTS="{{ etcd_scheme }}://{{ item }}:{{ etcd_client_port }}" etcdctl member list --write-out=json
      register: etcd_cluster_check
      failed_when: false
      changed_when: false
      loop: "{{ groups['etcd'] | map('extract', hostvars, 'ansible_host') | list }}"
      when: not etcd_data_exists.stat.exists

    - name: Determine if cluster already exists
      set_fact:
        cluster_exists: "{{ etcd_cluster_check.results | selectattr('rc', 'equalto', 0) | list | length > 0 }}"
      when: not etcd_data_exists.stat.exists

    - name: Set cluster state
      set_fact:
        etcd_initial_cluster_state: "{{ 'existing' if (cluster_exists | default(false)) else 'new' }}"

    - name: Get existing cluster members for joining node
      shell: |
        {{ etcdctl_tls_env }}ETCDCTL_ENDPOINTS="{{ etcd_scheme }}://{{ item }}:{{ etcd_client_port }}" \
        etcdctl member list --write-out=json
      register: existing_members_result
      failed_when: false
      loop: "{{ groups['etcd'] | map('extract', hostvars, 'ansible_host') | list }}"
      when: etcd_cluster_size | int > 1 and etcd_initial_cluster_state == 'existing' and not etcd_data_exists.stat.exists

    - name: Extract successful member list
      set_fact:
        existing_members_json: "{{ existing_members_result.results | selectattr('rc', 'equalto', 0) | first }}"
      when: etcd_cluster_size | int > 1 and etcd_initial_cluster_state == 'existing' and not etcd_data_exists.stat.exists

    - name: Build initial cluster string for joining node
      set_fact:
        etcd_join_cluster: "{{ (existing_members_json.stdout | from_json).members | map(attribute='name') | zip((existing_members_json.stdout | from_json).members | map(attribute='peerURLs') | map('first')) | map('join', '=') | join(',') }},{{ inventory_hostname }}={{ etcd_scheme }}://{{ ansible_host }}:{{ etcd_peer_port }}"
      when: etcd_cluster_size | int > 1 and etcd_initial_cluster_state == 'existing' and not etcd_data_exists.stat.exists

    # Pick the INITIAL_CLUSTER + STATE for the config template. For an
    # already-joined member (data dir present — every migration step) etcd reads
    # its peers from disk and ignores INITIAL_*, so we render best-effort values
    # and let the restart pick up the new listeners/advertise URLs.
    - name: Compute etcd config facts
      set_fact:
        etcd_cluster_state_value: >-
          {{ 'new'
             if (not etcd_data_exists.stat.exists and (etcd_cluster_size | int == 1 or etcd_initial_cluster_state == 'new'))
             else 'existing' }}
        etcd_initial_cluster_value: >-
          {{ (inventory_hostname ~ '=' ~ etcd_scheme ~ '://' ~ ansible_host ~ ':' ~ etcd_peer_port)
             if (not etcd_data_exists.stat.exists and etcd_cluster_size | int == 1)
             else (etcd_join_cluster
                   if (not etcd_data_exists.stat.exists and etcd_initial_cluster_state == 'existing')
                   else etcd_initial_cluster) }}

    # One template for every path (fresh single/new/join AND existing-node
    # migration restarts). Idempotent: unchanged content → no restart. During a
    # phase rollout, run with --limit <node> so only that node's etcd restarts,
    # preserving quorum on the rest.
    - name: Render etcd configuration
      template:
        src: templates/etcd.default.j2
        dest: /etc/default/etcd
        owner: root
        group: root
        mode: '0644'
      notify: restart etcd

    - name: Find working etcd node for member operations
      set_fact:
        working_etcd_host: "{{ existing_members_result.results | selectattr('rc', 'equalto', 0) | map(attribute='item') | first }}"
      when: etcd_cluster_size | int > 1 and etcd_initial_cluster_state == 'existing' and not etcd_data_exists.stat.exists

    - name: Add member to existing etcd cluster using etcdctl
      shell: |
        {{ etcdctl_tls_env }}ETCDCTL_ENDPOINTS="{{ etcd_scheme }}://{{ working_etcd_host }}:{{ etcd_client_port }}" \
        etcdctl member add "{{ inventory_hostname }}" \
        --peer-urls="{{ etcd_scheme }}://{{ ansible_host }}:{{ etcd_peer_port }}"
      register: add_member_result
      failed_when: add_member_result.rc != 0
      when: etcd_cluster_size | int > 1 and etcd_initial_cluster_state == 'existing' and not etcd_data_exists.stat.exists
      delegate_to: "{{ working_etcd_host }}"

    - name: Wait a moment after adding member
      pause:
        seconds: 2
      when: etcd_cluster_size | int > 1 and etcd_initial_cluster_state == 'existing' and not etcd_data_exists.stat.exists

    - name: Flush handlers to restart etcd immediately
      meta: flush_handlers

    - name: Enable etcd service
      systemd:
        name: etcd
        enabled: yes
        daemon_reload: yes

    - name: Start etcd service (non-blocking)
      systemd:
        name: etcd
        state: started
      async: 0
      poll: 0

    - name: Wait for etcd to be ready
      wait_for:
        port: "{{ etcd_client_port }}"
        host: "{{ ansible_host }}"
        timeout: 30

    # Phase `connect`: the advertised peer URL lives in cluster membership, not
    # in /etc/default/etcd, so a config rewrite + restart does NOT switch peers
    # to TLS — it must be done at runtime. Safe only after every node reached
    # `listen` (so all nodes already serve, and can dial, the TLS peer port).
    # Idempotent: skipped once this node's peer URL is already https.
    - name: Switch this node's advertised peer URL to TLS (connect phase)
      when: etcd_client_tls | default(false)
      block:
        - name: Read current etcd membership
          shell: |
            {{ etcdctl_tls_env }}ETCDCTL_ENDPOINTS="{{ etcd_scheme }}://{{ ansible_host }}:{{ etcd_client_port }}" \
            etcdctl member list --write-out=json
          register: etcd_member_list
          changed_when: false
          retries: 5
          delay: 3
          until: etcd_member_list.rc == 0

        - name: Locate this node's member entry
          set_fact:
            etcd_self_member: "{{ (etcd_member_list.stdout | from_json).members | selectattr('name', 'equalto', inventory_hostname) | first }}"

        - name: Update advertised peer URL to TLS if still plaintext
          shell: |
            {{ etcdctl_tls_env }}ETCDCTL_ENDPOINTS="{{ etcd_scheme }}://{{ ansible_host }}:{{ etcd_client_port }}" \
            etcdctl member update {{ '%x' | format(etcd_self_member.ID) }} \
            --peer-urls="https://{{ ansible_host }}:{{ etcd_tls_peer_port }}"
          when: etcd_self_member.peerURLs | select('match', '^https://') | list | length == 0
          register: etcd_peer_url_update
          changed_when: etcd_peer_url_update.rc == 0

    - name: Display etcd cluster information
      debug:
        msg: |
          etcd cluster configured with {{ etcd_cluster_size }} node(s)
          Node: {{ inventory_hostname }}
          Phase: {{ etcd_tls_phase | default('off') }}
          Client URL: {{ etcd_scheme }}://{{ ansible_host }}:{{ etcd_client_port }}

  handlers:
    - name: restart etcd
      systemd:
        name: etcd
        state: restarted
