# Network-bound disk encryption
tang_port: 8777

# --- etcd client config (single source of truth) ---------------------------
# Every etcd client (Python via etcd_utils, and shell via etcdctl) gets its
# endpoints + TLS material from one place: /etc/ycluster/etcd-client.env,
# written by install-ycluster-package.yml from the vars below and referenced by
# units via EnvironmentFile= and by scripts via `source`.
#
# To switch the whole cluster to mTLS (Phase 2c), define etcd_tls_enabled: true
# (here or in group/host vars) — see docs/design/etcd-access-hardening.md.
# Deliberately NOT hardcoded here: a value at this (playbook group_vars) level
# would override the dev cluster's inventory setting when its wrapper imports
# these playbooks. Everything below treats it as default(false).
etcd_tls_dir: /etc/etcd/tls
etcd_scheme: "{{ 'https' if (etcd_tls_enabled | default(false)) else 'http' }}"
# Comma-separated host:port list (no scheme) for the Python client (ETCD_HOSTS).
etcd_hosts: "{{ groups['etcd'] | map('extract', hostvars, 'ansible_host') | map('regex_replace', '$', ':2379') | join(',') }}"
# Comma-separated scheme://host:port list for etcdctl (ETCDCTL_ENDPOINTS).
etcdctl_endpoints: "{{ groups['etcd'] | map('extract', hostvars, 'ansible_host') | map('regex_replace', '^(.+)$', etcd_scheme ~ '://\\1:2379') | join(',') }}"
# TLS cert env (empty unless etcd_tls_enabled), shared by python + etcdctl.
etcd_tls_env: "{{ {'ETCD_CACERT': etcd_tls_dir ~ '/ca.crt', 'ETCD_CERT': etcd_tls_dir ~ '/client.crt', 'ETCD_KEY': etcd_tls_dir ~ '/client.key', 'ETCDCTL_CACERT': etcd_tls_dir ~ '/ca.crt', 'ETCDCTL_CERT': etcd_tls_dir ~ '/client.crt', 'ETCDCTL_KEY': etcd_tls_dir ~ '/client.key'} if (etcd_tls_enabled | default(false)) else {} }}"
# Full env dict for ad-hoc command/shell tasks: environment: "{{ etcd_client_env }}"
etcd_client_env: "{{ {'ETCD_HOSTS': etcd_hosts, 'ETCDCTL_ENDPOINTS': etcdctl_endpoints} | combine(etcd_tls_env) }}"

# Bootstrap files location (ansible SSH key, etc.)
bootstrap_files_dir: /opt/bootstrap-files

# Cluster gateway VIP — keepalived-managed across core nodes; routes
# external traffic and runs dnsmasq + squid for joining nodes.
gateway_vip: "10.0.0.254"

# Metric for the cluster default route via gateway_vip. Higher than
# the DHCP-installed uplink default (100) so a working uplink wins,
# and the cluster route is the fallback when no uplink is up.
vip_metric: 500

# WireGuard peer subnet and route metric. The route is declared in the
# netplan template so networkd installs it at boot with no rc.local race.
# On the wg server itself the connected wg0 route wins (lower metric).
wg_peer_subnet: "10.0.1.0/24"
wg_route_metric: 1024
