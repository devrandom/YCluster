---
# Chassis (IPMI) and GPU (nvidia-smi) temperature collection for nvidia
# nodes. Uses the node_exporter textfile collector — that directory is
# already configured by install-prometheus.yml.
#
# IPMI is the only way to read VFIO-passthrough GPU temps from the host:
# the BMC reads thermal diodes via the chassis sensor bus, so it works
# regardless of which driver (nvidia, vfio-pci, none) is bound to the
# card.
- name: Install node temperature collector on nvidia nodes
  hosts: nvidia
  become: yes
  vars:
    collector_path: /usr/local/lib/cluster/node-temps-collector
    vm_gpu_collector_path: /usr/local/lib/cluster/vm-gpu-collector
    interval_sec: 30

  tasks:
    - name: Install temp collector dependencies
      apt:
        name:
          - ipmitool
          # pyserial: used when /dev/ttyACM0 exists (Comino RM cooling
          # controller on liquid-cooled chassis like nv3).
          - python3-serial
        state: present

    # The prometheus-node-exporter-collectors package ships its own
    # ipmitool_sensor.timer that writes to the same textfile dir and
    # publishes node_ipmi_temperature_celsius *without* the role label
    # we depend on for alert routing. Disable it; our collector is the
    # single source of truth.
    - name: Disable shipped ipmitool_sensor timer/service
      systemd:
        name: "{{ item }}"
        enabled: no
        state: stopped
      failed_when: false
      loop:
        - prometheus-node-exporter-ipmitool-sensor.timer
        - prometheus-node-exporter-ipmitool-sensor.service

    - name: Remove stale ipmitool_sensor.prom from shipped collector
      file:
        path: /var/lib/prometheus/node-exporter/ipmitool_sensor.prom
        state: absent

    - name: Ensure ipmi kernel modules load at boot
      copy:
        dest: /etc/modules-load.d/ipmi.conf
        content: |
          ipmi_devintf
          ipmi_si
        mode: '0644'
      register: ipmi_modules

    - name: Load ipmi modules now
      shell: modprobe ipmi_devintf && modprobe ipmi_si
      when: ipmi_modules.changed
      failed_when: false

    # Super-I/O hwmon driver for chassis-ambient (SYSTIN), the only room-temp
    # proxy on chassis with no IPMI intake / Comino sensor. Auto-detected
    # rather than declared per-host: try the module, then persist it only
    # where a Nuvoton chip actually bound. This keeps the playbook
    # deployment-agnostic (no hostnames) and avoids leaving
    # systemd-modules-load.service failed on boards that have no such chip,
    # where the module refuses to insert. node_exporter's hwmon collector
    # surfaces the sensor automatically once loaded; the chassis-ambient
    # alert keys on the SYSTIN label and suppresses nodes that have a real
    # intake sensor, so loading it on an intake-equipped board is harmless.
    - name: Probe for a Nuvoton Super-I/O chassis-ambient sensor
      command: modprobe nct6775
      changed_when: false
      failed_when: false

    - name: Detect whether an nct6xxx hwmon chip bound
      shell: grep -ilq '^nct6' /sys/class/hwmon/hwmon*/name
      register: nct_hwmon
      changed_when: false
      failed_when: false

    - name: Persist chassis-ambient sensor module where the chip is present
      copy:
        dest: /etc/modules-load.d/nct6775.conf
        content: "nct6775\n"
        mode: '0644'
      when: nct_hwmon.rc == 0

    - name: Drop chassis-ambient persistence where no such chip exists
      file:
        path: /etc/modules-load.d/nct6775.conf
        state: absent
      when: nct_hwmon.rc != 0

    # The probe pulls in nct6775_core as a dependency even when the platform
    # driver binds no chip (no hwmon, no metric). Unload it so a board
    # without the sensor is left exactly as found.
    - name: Unload probe module where no chip bound
      shell: for m in nct6775 nct6775_core; do modprobe -r "$m" 2>/dev/null || true; done
      changed_when: false
      when: nct_hwmon.rc != 0

    - name: Install temperature collector script
      copy:
        src: files/node-temps-collector.py
        dest: "{{ collector_path }}"
        owner: root
        group: root
        mode: '0755'

    - name: Create systemd service for temp collector
      copy:
        dest: /etc/systemd/system/node-temps-collector.service
        content: |
          [Unit]
          Description=Collect chassis and GPU temperatures for node_exporter
          After=network.target

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/python3 {{ collector_path }}
          User=root
          # ipmitool needs /dev/ipmi*; nvidia-smi needs no extra perms.
          # Keep modest sandboxing; ProtectSystem=strict would block the
          # textfile dir write, so use ReadWritePaths instead.
          ProtectSystem=strict
          ProtectHome=true
          PrivateTmp=true
          NoNewPrivileges=true
          ReadWritePaths=/var/lib/prometheus/node-exporter
        mode: '0644'
      notify: reload systemd

    - name: Create systemd timer for temp collector
      copy:
        dest: /etc/systemd/system/node-temps-collector.timer
        content: |
          [Unit]
          Description=Collect chassis and GPU temperatures every {{ interval_sec }}s

          [Timer]
          OnBootSec=20s
          OnUnitActiveSec={{ interval_sec }}s
          AccuracySec=5s

          [Install]
          WantedBy=timers.target
        mode: '0644'
      notify: reload systemd

    - name: Enable and start temp collector timer
      systemd:
        name: node-temps-collector.timer
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Run an initial collection so metrics appear immediately
      command: /usr/bin/python3 {{ collector_path }}
      changed_when: false
      failed_when: false

    # VM GPU collector: VFIO-passthrough GPUs aren't visible to the host
    # nvidia driver. Exec nvidia-smi inside running incus VMs to get
    # utilisation, memory, and power. Only installed on hosts that
    # actually run VMs (incus_vm_host: true in host_vars).
    - name: Install VM GPU collector script
      copy:
        src: files/vm-gpu-collector.py
        dest: "{{ vm_gpu_collector_path }}"
        owner: root
        group: root
        mode: '0755'
      when: incus_vm_host | default(false)

    - name: Create systemd service for VM GPU collector
      copy:
        dest: /etc/systemd/system/vm-gpu-collector.service
        content: |
          [Unit]
          Description=Collect GPU metrics from VMs holding passthrough GPUs
          After=incus.service

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/python3 {{ vm_gpu_collector_path }}
          User=root
          # incus CLI does `mkdir $HOME/.config/incus` on every invocation;
          # under ProtectSystem=strict that hits the read-only /root and
          # fails. PrivateTmp gives us a fresh writable /tmp on every
          # run — relocate HOME there so incus has somewhere to scribble.
          Environment=HOME=/tmp
          ProtectSystem=strict
          ProtectHome=true
          PrivateTmp=true
          NoNewPrivileges=true
          ReadWritePaths=/var/lib/prometheus/node-exporter
        mode: '0644'
      when: incus_vm_host | default(false)
      notify: reload systemd

    - name: Create systemd timer for VM GPU collector
      copy:
        dest: /etc/systemd/system/vm-gpu-collector.timer
        content: |
          [Unit]
          Description=Collect VM GPU metrics every {{ interval_sec }}s

          [Timer]
          OnBootSec=30s
          OnUnitActiveSec={{ interval_sec }}s
          AccuracySec=5s

          [Install]
          WantedBy=timers.target
        mode: '0644'
      when: incus_vm_host | default(false)
      notify: reload systemd

    - name: Enable and start VM GPU collector timer
      systemd:
        name: vm-gpu-collector.timer
        enabled: yes
        state: started
        daemon_reload: yes
      when: incus_vm_host | default(false)

    - name: Run an initial VM GPU collection
      command: /usr/bin/python3 {{ vm_gpu_collector_path }}
      changed_when: false
      failed_when: false
      when: incus_vm_host | default(false)

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes
