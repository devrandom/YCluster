---
# Blackbox mTLS certs are minted from the unified cluster CA
# (/etc/ycluster/ca, replicated to core nodes by setup-etcd-tls.yml).
# Minting runs once on any core node holding the CA key, then the certs
# are fetched to the controller and distributed below.
- name: Mint blackbox TLS certificates from the cluster CA
  hosts: etcd
  become: yes
  run_once: true
  tasks:
    - name: Check for the cluster CA key
      stat:
        path: /etc/ycluster/ca/ca.key
      register: ca_key

    - name: Generate and fetch certificates
      when: ca_key.stat.exists
      block:
        - name: Generate server certificates for each blackbox host
          command: /usr/local/bin/ycluster tls ca generate-server {{ item }} --san {{ hostvars[item]['ansible_host'] }} --san localhost --san 127.0.0.1
          loop: "{{ groups['core'] + (groups['frontend'] | default([])) }}"
          register: gen_cert_result
          changed_when: "'skipping' not in gen_cert_result.stdout"

        - name: Fetch CA certificate to control machine
          fetch:
            src: /etc/ycluster/ca/ca.crt
            dest: /tmp/blackbox-ca.crt
            flat: yes

        - name: Fetch server certificates to control machine
          fetch:
            src: /etc/ycluster/ca/certs/{{ item }}.crt
            dest: /tmp/blackbox-{{ item }}.crt
            flat: yes
          loop: "{{ groups['core'] + (groups['frontend'] | default([])) }}"

        - name: Fetch server keys to control machine
          fetch:
            src: /etc/ycluster/ca/certs/{{ item }}.key
            dest: /tmp/blackbox-{{ item }}.key
            flat: yes
          loop: "{{ groups['core'] + (groups['frontend'] | default([])) }}"

- name: Install Blackbox Exporter
  hosts: core:frontend
  become: yes

  tasks:
    - name: Install Blackbox Exporter
      apt:
        name: prometheus-blackbox-exporter
        state: present

    - name: Configure blackbox probe modules
      copy:
        dest: /etc/prometheus/blackbox.yml
        owner: prometheus
        group: prometheus
        mode: '0644'
        content: |
          # YCluster blackbox probe modules. Managed by install-blackbox.yml.
          modules:
            http_2xx:
              prober: http
              timeout: 10s
              http:
                preferred_ip_protocol: ip4
            http_401:
              # For endpoints that return 401 when probed without auth
              # (e.g. /v1/models behind nginx auth_request).
              # Treat 401 as healthy.
              prober: http
              timeout: 10s
              http:
                preferred_ip_protocol: ip4
                valid_status_codes: [401]
      notify: restart blackbox exporter

    - name: Create blackbox TLS directory
      file:
        path: /etc/blackbox_exporter/tls
        state: directory
        mode: '0755'
        owner: prometheus
        group: prometheus

    - name: Check if CA certificate was fetched
      delegate_to: localhost
      stat:
        path: /tmp/blackbox-ca.crt
      register: ca_cert_fetched
      become: no

    - name: Distribute certificates to all hosts
      when: ca_cert_fetched.stat.exists
      block:
        - name: Copy CA certificate to all blackbox hosts
          copy:
            src: /tmp/blackbox-ca.crt
            dest: /etc/blackbox_exporter/tls/ca.crt
            owner: prometheus
            group: prometheus
            mode: '0644'

        - name: Copy server certificate to all blackbox hosts
          copy:
            src: /tmp/blackbox-{{ inventory_hostname }}.crt
            dest: /etc/blackbox_exporter/tls/server.crt
            owner: prometheus
            group: prometheus
            mode: '0644'

        - name: Copy server private key to all blackbox hosts
          copy:
            src: /tmp/blackbox-{{ inventory_hostname }}.key
            dest: /etc/blackbox_exporter/tls/server.key
            owner: prometheus
            group: prometheus
            mode: '0600'

        - name: Create blackbox exporter web config for TLS
          copy:
            content: |
              tls_server_config:
                cert_file: /etc/blackbox_exporter/tls/server.crt
                key_file: /etc/blackbox_exporter/tls/server.key
                client_ca_file: /etc/blackbox_exporter/tls/ca.crt
                client_auth_type: RequireAndVerifyClientCert
            dest: /etc/blackbox_exporter/web-config.yml
            owner: prometheus
            group: prometheus
            mode: '0644'
          notify: restart blackbox exporter

        - name: Configure blackbox exporter default args for TLS
          copy:
            content: |
              # Arguments for blackbox exporter
              ARGS="--config.file=/etc/prometheus/blackbox.yml --web.config.file=/etc/blackbox_exporter/web-config.yml --web.listen-address=:9115"
            dest: /etc/default/prometheus-blackbox-exporter
            mode: '0644'
          notify: restart blackbox exporter

    - name: Warn if no cluster CA available
      debug:
        msg: "WARNING: No cluster CA available - TLS certificates not configured. Run setup-etcd-tls.yml (or ycluster tls ca generate on a core node), then re-run this playbook."
      when: not ca_cert_fetched.stat.exists

    - name: Enable and start Blackbox Exporter
      systemd:
        name: prometheus-blackbox-exporter
        enabled: yes
        state: started

    # Frontends run ufw (set up by install-rathole-server.yml); open the
    # exporter port so core Prometheus can scrape it. The endpoint is mTLS
    # (RequireAndVerifyClientCert), so a port-level allow is safe. Core nodes
    # don't run ufw here, so this is frontend-only.
    - name: Allow blackbox exporter port through ufw on frontends
      community.general.ufw:
        rule: allow
        port: '9115'
        proto: tcp
      when: inventory_hostname in groups['frontend']

  handlers:
    - name: restart blackbox exporter
      systemd:
        name: prometheus-blackbox-exporter
        state: restarted
